<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Book a Worker</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; }
  .navbar { display:flex; align-items:center; padding:20px 25px; background-color:#fffdf7; border-bottom:1px solid #ede9df; gap:15px; }
  .back-btn { font-size:22px; cursor:pointer; color:#00b894; }
  .navbar h3 { font-size:20px; font-weight:800; color:#1a1a1a; }
  .content { padding:25px; }
  .service-badge { display:inline-flex; align-items:center; gap:10px; background-color:#e8f8f4; border:2px solid #00b894; border-radius:50px; padding:10px 20px; margin-bottom:25px; }
  .service-badge .icon { font-size:24px; }
  .service-badge p { font-size:16px; font-weight:800; color:#00b894; }
  .service-note { background-color:#f0faf6; border:1px solid #00b89433; border-radius:12px; padding:12px 16px; margin-bottom:20px; font-size:13px; color:#00b894; display:none; }
  .input-group { margin-bottom:22px; }
  .input-group label { display:block; font-size:13px; font-weight:700; color:#888; margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
  .input-group input, .input-group textarea {
    width:100%; padding:15px 20px; background-color:#fffdf7; border:2px solid #ede9df;
    border-radius:15px; color:#1a1a1a; font-size:16px; outline:none; resize:none; transition:border-color 0.2s;
  }
  .input-group input:focus, .input-group textarea:focus { border-color:#00b894; }
  .input-group input.err, .input-group textarea.err { border-color:#e74c3c; }
  .field-err { color:#e74c3c; font-size:12px; margin-top:6px; display:none; }
  .urgency-options { display:flex; gap:10px; flex-wrap:wrap; }
  .urgency-btn { padding:12px 20px; border-radius:50px; border:2px solid #ede9df; background:#fffdf7; color:#555; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .urgency-btn.active { border-color:#00b894; color:#00b894; background-color:#e8f8f4; }
  .urgency-btn.emergency.active { border-color:#e74c3c; color:#e74c3c; background-color:#fff0ee; }
  .price-estimate { background-color:#fffdf7; border:1px solid #ede9df; border-radius:20px; padding:20px; margin-bottom:22px; }
  .price-estimate h4 { font-size:13px; color:#888; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
  .price-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:15px; color:#555; }
  .price-row.total { border-top:1px solid #ede9df; padding-top:10px; margin-top:8px; font-weight:800; font-size:17px; color:#1a1a1a; }
  .price-row .amount { color:#00b894; font-weight:800; }
  .btn-main { width:100%; padding:18px; background-color:#00b894; color:#fff; font-size:18px; font-weight:800; border:none; border-radius:15px; cursor:pointer; transition:background-color 0.2s; }
  .btn-main:hover { background-color:#009e7f; }
</style>

<nav class="navbar">
  <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
  <h3 id="navTitle">Book a Worker</h3>
</nav>

<div class="content">
  <div class="service-badge">
    <div class="icon" id="serviceIcon">🔧</div>
    <p id="serviceName">Plumber</p>
  </div>

  <div class="service-note" id="serviceNote"></div>

  <div class="input-group">
    <label>Describe Your Problem</label>
    <textarea id="problem" rows="4" placeholder="Describe what you need help with..." oninput="clearField('problem','errProblem')"></textarea>
    <div class="field-err" id="errProblem">Please describe your problem</div>
  </div>

  <div class="input-group">
    <label>Your Address</label>
    <input type="text" id="address" placeholder="Enter your full address" oninput="clearField('address','errAddress')" />
    <div class="field-err" id="errAddress">Please enter your address</div>
  </div>

  <div class="input-group">
    <label>How Urgent Is This?</label>
    <div class="urgency-options">
      <button class="urgency-btn active" onclick="selectUrgency(this,'normal')">🕐 Normal</button>
      <button class="urgency-btn" onclick="selectUrgency(this,'urgent')">⚡ Urgent</button>
      <button class="urgency-btn emergency" onclick="selectUrgency(this,'emergency')">🚨 Emergency</button>
    </div>
  </div>

  <div class="price-estimate">
    <h4>Price Estimate</h4>
    <div class="price-row"><span>Service Fee</span><span class="amount" id="serviceFee">₹299</span></div>
    <div class="price-row"><span>Platform Fee</span><span class="amount">₹49</span></div>
    <div class="price-row total"><span>Total Estimate</span><span class="amount" id="totalFee">₹348</span></div>
  </div>

  <button class="btn-main" onclick="findWorker()">🔍 Find Worker Now</button>
</div>

<script>
  if (!localStorage.getItem('phoneNumber')) { window.location.href = 'login.html'; }
  if (localStorage.getItem('adminLoggedIn')) { window.location.href = '../admin/index.html'; }

  const SERVICE_CONFIG = {
    'Plumber':                { icon:'🔧', price:299, placeholder:'e.g. Water pipe leaking, tap not working...', note:null },
    'Electrician':            { icon:'⚡', price:349, placeholder:'e.g. Power outage, short circuit, wiring issue...', note:null },
    'Locksmith':              { icon:'🔑', price:249, placeholder:'e.g. Locked out, broken lock, key duplication...', note:null },
    'AC Repair':              { icon:'❄️', price:499, placeholder:'e.g. AC not cooling, strange noise, water leaking...', note:null },
    'Carpenter':              { icon:'🪛', price:299, placeholder:'e.g. Door not closing, furniture assembly, shelf fixing...', note:null },
    'Painter':                { icon:'🖌️', price:399, placeholder:'e.g. Room painting, wall touch-up, waterproofing...', note:null },
    'Pest Control':           { icon:'🐛', price:499, placeholder:'e.g. Cockroaches, rats, mosquitoes, bed bugs...', note:'🌿 Eco-friendly chemicals used. Keep pets away for 2 hours after service.' },
    'Home Cleaning':          { icon:'🧹', price:399, placeholder:'e.g. Deep clean, kitchen cleaning, bathroom scrub...', note:'✨ Bring your own cleaning products or our team can supply them (+₹50).' },
    'TV / Electronics Repair':{ icon:'📺', price:349, placeholder:'e.g. TV no display, laptop not charging, speaker issue...', note:null },
    'Water Purifier Service': { icon:'🫧', price:299, placeholder:'e.g. Filter change, low water flow, purifier not working...', note:null },
    'Appliance Repair':       { icon:'🔩', price:349, placeholder:'e.g. Washing machine, fridge, microwave, dishwasher...', note:null },
    'Bathroom Renovation':    { icon:'🚿', price:799, placeholder:'e.g. Tile replacement, shower fitting, sink installation...', note:'🏗️ This is a major service. Worker will assess and provide final quote on-site.' },
    'Packers & Movers':       { icon:'📦', price:999, placeholder:'e.g. Moving to new flat, packing fragile items, furniture shifting...', note:'🚛 Final price depends on number of items and distance. Quote given on-site.' },
    'CCTV Installation':      { icon:'🔒', price:599, placeholder:'e.g. 2-camera setup, DVR connection, night vision cameras...', note:'📹 Price covers installation only. Camera hardware sold separately if needed.' },
  };

  const urlParams = new URLSearchParams(window.location.search);
  const service = decodeURIComponent(urlParams.get('service') || 'Plumber');
  const config  = SERVICE_CONFIG[service] || SERVICE_CONFIG['Plumber'];

  document.getElementById('serviceName').innerText  = service;
  document.getElementById('serviceIcon').innerText  = config.icon;
  document.getElementById('navTitle').innerText     = service;
  document.getElementById('problem').placeholder    = config.placeholder;

  if (config.note) {
    const noteEl = document.getElementById('serviceNote');
    noteEl.innerText = config.note;
    noteEl.style.display = 'block';
  }

  let basePrice = config.price;
  document.getElementById('serviceFee').innerText = '₹' + basePrice;
  document.getElementById('totalFee').innerText   = '₹' + (basePrice + 49);
  let selectedUrgency = 'normal';

  function selectUrgency(btn, urgency) {
    document.querySelectorAll('.urgency-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedUrgency = urgency;
    let fee = basePrice;
    if (urgency === 'emergency') fee = basePrice * 2;
    else if (urgency === 'urgent') fee = Math.round(basePrice * 1.5);
    document.getElementById('serviceFee').innerText = '₹' + fee;
    document.getElementById('totalFee').innerText   = '₹' + (fee + 49);
  }

  function clearField(inputId, errId) {
    document.getElementById(inputId).classList.remove('err');
    document.getElementById(errId).style.display = 'none';
  }

  function findWorker() {
    const problem = document.getElementById('problem').value.trim();
    const address = document.getElementById('address').value.trim();
    let hasErr = false;
    if (!problem) { document.getElementById('problem').classList.add('err'); document.getElementById('errProblem').style.display = 'block'; hasErr = true; }
    if (!address) { document.getElementById('address').classList.add('err'); document.getElementById('errAddress').style.display = 'block'; hasErr = true; }
    if (hasErr) return;
    const urgencyMultiplier = selectedUrgency === 'emergency' ? 2 : selectedUrgency === 'urgent' ? 1.5 : 1;
    const finalAmount = Math.round(basePrice * urgencyMultiplier) + 49;
    localStorage.setItem('bookingService', service);
    localStorage.setItem('bookingProblem', problem);
    localStorage.setItem('bookingAddress', address);
    localStorage.setItem('bookingUrgency', selectedUrgency);
    localStorage.setItem('bookingAmount',  finalAmount);
    localStorage.setItem('bookingIcon',    config.icon);
    window.location.href = 'finding.html';
  }
</script>
</body>
</html>
