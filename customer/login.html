<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Login</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0f0f0f; color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background-color:#1a1a1a; border-radius:30px; padding:50px 40px; width:100%; max-width:420px; text-align:center; }
  .logo { font-size:28px; font-weight:900; color:#00d4ff; letter-spacing:3px; margin-bottom:10px; }
  .tagline { font-size:14px; color:#aaaaaa; margin-bottom:40px; }
  h2 { font-size:24px; font-weight:800; margin-bottom:10px; }
  .subtitle { font-size:14px; color:#aaaaaa; margin-bottom:20px; }
  .phone-wrap { margin-bottom:6px; }
  .phone-input {
    display:flex; align-items:center; background-color:#2a2a2a;
    border-radius:15px; padding:5px 15px;
    border:2px solid #333; transition:border-color 0.2s;
  }
  .phone-input:focus-within { border-color:#00d4ff; }
  .phone-input.err { border-color:#ff3b3b !important; }
  .country-code { font-size:16px; font-weight:700; color:white; padding-right:10px; border-right:1px solid #444; margin-right:10px; }
  .phone-input input { background:none; border:none; outline:none; color:white; font-size:18px; width:100%; padding:12px 0; }
  .field-err { color:#ff3b3b; font-size:12px; margin-bottom:14px; display:none; text-align:left; }
  .btn-main { width:100%; padding:18px; background-color:#00d4ff; color:#0f0f0f; font-size:18px; font-weight:800; border:none; border-radius:15px; cursor:pointer; margin-bottom:20px; margin-top:10px; }
  .btn-main:hover { background-color:#00b8d9; }
  .btn-main:disabled { background-color:#444; cursor:not-allowed; }
  .register-link { font-size:14px; color:#aaaaaa; margin-bottom:20px; }
  .register-link span { color:#00d4ff; cursor:pointer; font-weight:700; }
  .terms { font-size:12px; color:#666666; }
  .terms span { color:#00d4ff; cursor:pointer; }
</style>

<div class="login-box">
  <div class="logo">ZIPFIX</div>
  <div class="tagline">Emergency help in minutes</div>

  <h2>Enter your phone number</h2>
  <p class="subtitle">We'll send you a 6-digit OTP to verify</p>

  <div class="phone-wrap">
    <div class="phone-input" id="phoneWrap">
      <div class="country-code">+91</div>
      <input type="number" id="phoneNumber" placeholder="98765 43210" maxlength="10"
        oninput="clearErr()" />
    </div>
    <div class="field-err" id="phoneErr">Please enter a valid 10-digit phone number</div>
  </div>

  <button class="btn-main" id="sendBtn" onclick="sendOTP()">Send OTP</button>

  <p class="register-link">
    New to ZipFix?
    <span onclick="window.location.href='register.html'">Create Account</span>
  </p>

  <p class="terms">
    By continuing you agree to our
    <span>Terms of Service</span> and <span>Privacy Policy</span>
  </p>
</div>

<script>
    // If already logged in, go straight to dashboard
    if (localStorage.getItem('phoneNumber') && localStorage.getItem('userName')) {
      window.location.href = 'dashboard.html';
    }

  function clearErr() {
    document.getElementById('phoneWrap').classList.remove('err');
    document.getElementById('phoneErr').style.display = 'none';
  }

  function sendOTP() {
    const phone = document.getElementById('phoneNumber').value.trim();

    if (phone.length < 10) {
      document.getElementById('phoneWrap').classList.add('err');
      document.getElementById('phoneErr').style.display = 'block';
      return;
    }

    localStorage.setItem('phoneNumber', phone);
    alert('OTP sent to +91 ' + phone); // ✅ only alert kept
    window.location.href = 'otp.html';
  }

  // Allow pressing Enter to submit
  document.getElementById('phoneNumber').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendOTP();
  });
</script>
</body>
</html>
