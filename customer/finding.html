<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ZipFix — Finding Worker</title>
</head>
<body>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#f5f5f5;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px;}
  .container{width:100%;max-width:400px;}
  .logo{font-size:24px;font-weight:900;color:#00b894;letter-spacing:3px;margin-bottom:44px;}
  .radar{position:relative;width:200px;height:200px;margin:0 auto 44px;}
  .rc{position:absolute;border-radius:50%;border:2px solid #00b894;top:50%;left:50%;transform:translate(-50%,-50%);animation:rp 2s infinite;opacity:0;}
  .rc:nth-child(1){width:55px;height:55px;animation-delay:0s;}
  .rc:nth-child(2){width:110px;height:110px;animation-delay:0.5s;}
  .rc:nth-child(3){width:165px;height:165px;animation-delay:1s;}
  .rc:nth-child(4){width:200px;height:200px;animation-delay:1.5s;}
  @keyframes rp{0%{opacity:1;transform:translate(-50%,-50%) scale(0.8)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
  .center-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:46px;}
  h2{font-size:24px;font-weight:900;margin-bottom:10px;}
  .sub{font-size:14px;color:#888;margin-bottom:34px;line-height:1.6;}
  .steps{text-align:left;background:#fff;border-radius:18px;padding:20px;margin-bottom:26px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .step{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid #f5f5f5;font-size:14px;color:#aaa;}
  .step:last-child{border-bottom:none;}
  .step.done{color:#1a1a1a;}
  .step.active{color:#00b894;font-weight:700;}
  .step-icon{font-size:18px;width:28px;text-align:center;}
  .cancel-btn{background:#fff;border:2px solid #e0e0e0;color:#888;padding:14px 38px;border-radius:50px;font-size:14px;cursor:pointer;transition:all 0.2s;}
  .cancel-btn:hover{border-color:#e74c3c;color:#e74c3c;}
  .wait-note{font-size:12px;color:#aaa;margin-top:14px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div class="container">
  <div class="logo">ZIPFIX</div>
  <div class="radar">
    <div class="rc"></div><div class="rc"></div><div class="rc"></div><div class="rc"></div>
    <div class="center-icon" id="centerIcon">📍</div>
  </div>
  <h2 id="mainText">Finding Worker...</h2>
  <p class="sub" id="subText">Searching for available workers<br/>near your location in Hyderabad</p>
  <div class="steps">
    <div class="step done" id="step1"><div class="step-icon">✅</div><div>Booking received</div></div>
    <div class="step active" id="step2"><div class="step-icon">🔍</div><div>Finding nearby workers</div></div>
    <div class="step" id="step3"><div class="step-icon">👷</div><div>Connecting to worker</div></div>
    <div class="step" id="step4"><div class="step-icon">✅</div><div>Worker confirmed</div></div>
  </div>
  <button class="cancel-btn" onclick="cancelBooking()">Cancel Search</button>
  <div class="wait-note" id="waitNote">Posting your job to nearby workers...</div>
</div>
<script>
  if(!localStorage.getItem('phoneNumber')){window.location.href='login.html';}
  const SUPABASE_URL='https://wenvdgvyuhqdiktetvfj.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4';
  const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const sIcons={Plumber:'🔧',Electrician:'⚡',Locksmith:'🔑','AC Repair':'❄️',Carpenter:'🪛',Painter:'🖌️','Pest Control':'🐛','Home Cleaning':'🧹','TV / Electronics Repair':'📺','Water Purifier Service':'🫧','Appliance Repair':'🔩','Bathroom Renovation':'🛁','Packers & Movers':'📦','CCTV Installation':'🔒'};
  const service=localStorage.getItem('bookingService')||'Plumber';
  const problem=localStorage.getItem('bookingProblem')||'';
  const address=localStorage.getItem('bookingAddress')||'';
  const urgency=localStorage.getItem('bookingUrgency')||'normal';
  const amount=parseInt(localStorage.getItem('bookingAmount')||'349');
  const custName=localStorage.getItem('userName')||'Customer';
  const custPhone=localStorage.getItem('phoneNumber')||'';
  document.getElementById('centerIcon').innerText=sIcons[service]||'🔧';
  let jobId=null,pollInterval=null,cancelled=false;

  async function postJob(){
    try{
      const{data,error}=await db.from('jobs').insert([{customer_name:custName,customer_phone:custPhone,customer_address:address,service,problem,urgency,amount,status:'pending',worker_id:null}]).select().single();
      if(error)throw error;
      jobId=data.id;
      localStorage.setItem('activeJobId',jobId);
      document.getElementById('waitNote').innerText='Job posted! Waiting for a '+service+' to accept...';
      setTimeout(advanceStep3,2000);
      pollInterval=setInterval(checkWorker,3000);
    }catch(e){document.getElementById('waitNote').innerText='⚠️ Error: '+e.message;}
  }
  function advanceStep3(){
    if(cancelled)return;
    document.getElementById('step2').className='step done';
    document.getElementById('step3').className='step active';
    document.getElementById('mainText').innerText='Almost There...';
    document.getElementById('subText').innerText='Connecting you to the best '+service+' near you';
  }
  async function checkWorker(){
    if(cancelled||!jobId)return;
    try{
      const{data,error}=await db.from('jobs').select('*').eq('id',jobId).single();
      if(error)throw error;
      if(data.status==='accepted'&&data.worker_id){clearInterval(pollInterval);workerFound(data);}
    }catch(e){}
  }
  async function workerFound(job){
    if(cancelled)return;
    let wName='Your Worker',wInitial='W';
    try{
      const{data:w}=await db.from('workers').select('name,skill,area').eq('worker_id',job.worker_id).single();
      if(w){wName=w.name;wInitial=w.name.charAt(0).toUpperCase();}
    }catch(e){}
    localStorage.setItem('workerName',wName);
    localStorage.setItem('workerInitial',wInitial);
    localStorage.setItem('assignedWorkerId',job.worker_id);
    document.getElementById('step3').className='step done';
    document.getElementById('step4').className='step active';
    document.getElementById('mainText').innerText='Worker Found! 🎉';
    document.getElementById('subText').innerText=wName+' is on the way!';
    document.getElementById('centerIcon').innerText='🎉';
    document.getElementById('waitNote').innerText='✅ '+wName+' accepted your job!';
    setTimeout(()=>{window.location.href='worker.html';},2000);
  }
  async function cancelBooking(){
    if(!confirm('Are you sure you want to cancel?'))return;
    cancelled=true;clearInterval(pollInterval);
    if(jobId){try{await db.from('jobs').update({status:'cancelled'}).eq('id',jobId);}catch(e){}localStorage.removeItem('activeJobId');}
    window.location.href='dashboard.html';
  }
  postJob();
</script>
</body>
</html>
