<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Worker</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#111; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .splash-logo { font-size:48px; font-weight:900; letter-spacing:6px; color:#00b894; opacity:0; transform:scale(0.8); animation:popIn 0.7s ease forwards; }
  .splash-tag { font-size:14px; color:#888; letter-spacing:2px; margin-top:12px; opacity:0; animation:fadeUp 0.6s ease 0.5s forwards; }
  .splash-sub { font-size:12px; color:#555; letter-spacing:1px; margin-top:8px; opacity:0; animation:fadeUp 0.6s ease 0.7s forwards; }
  .splash-dot { width:8px; height:8px; background:#00b894; border-radius:50%; margin-top:50px; opacity:0.2; animation:blink 0.9s ease 0.9s infinite; }
  @keyframes popIn { 0%{opacity:0;transform:scale(0.7)} 60%{opacity:1;transform:scale(1.06)} 100%{opacity:1;transform:scale(1)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
</style>

<div class="splash-logo">ZIPFIX</div>
<div class="splash-tag">Worker Portal</div>
<div class="splash-sub">Earn Money Near You</div>
<div class="splash-dot"></div>

<script>
  if (localStorage.getItem('workerName') && localStorage.getItem('workerId')) {
    window.location.href = 'dashboard.html';
  } else {
    setTimeout(function() {
      window.location.href = 'index.html';
    }, 2200);
  }
</script>
</body>
</html>
