<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Worker — Earnings</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0a0a0a; color:white; min-height:100vh; }
  .navbar { display:flex; align-items:center; padding:20px 25px; background-color:#1a1a1a; gap:15px; }
  .back-btn { font-size:22px; cursor:pointer; color:#ff8c00; }
  .navbar h3 { font-size:20px; font-weight:800; }
  .content { padding:25px; }
  .total-card { background:linear-gradient(135deg,#2a1a00,#1a0f00); border:2px solid #ff8c00; border-radius:25px; padding:30px; text-align:center; margin-bottom:20px; }
  .total-card h4 { font-size:13px; color:#aaaaaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .total-amount { font-size:52px; font-weight:900; color:#ff8c00; margin-bottom:5px; }
  .total-note { font-size:13px; color:#aaaaaa; }
  .period-tabs { display:flex; gap:10px; margin-bottom:20px; }
  .tab { flex:1; padding:12px; background-color:#1a1a1a; border-radius:12px; text-align:center; cursor:pointer; font-size:14px; font-weight:700; color:#aaaaaa; border:2px solid transparent; }
  .tab.active { border-color:#ff8c00; color:#ff8c00; background-color:#2a1a00; }
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
  .stat-card { background-color:#1a1a1a; border-radius:18px; padding:20px; text-align:center; }
  .stat-card h3 { font-size:24px; font-weight:900; color:#ff8c00; }
  .stat-card p { font-size:12px; color:#aaaaaa; margin-top:5px; }
  .section-title { font-size:17px; font-weight:800; margin-bottom:15px; }
  .job-item { background-color:#1a1a1a; border-radius:18px; padding:18px 20px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .job-left h4 { font-size:16px; font-weight:800; }
  .job-left p { font-size:13px; color:#aaaaaa; margin-top:4px; }
  .job-right h4 { font-size:18px; font-weight:900; color:#ff8c00; text-align:right; }
  .job-right p { font-size:12px; color:#00ff88; margin-top:4px; text-align:right; }
  .btn-withdraw { width:100%; padding:20px; background-color:#ff8c00; color:#0a0a0a; font-size:18px; font-weight:900; border:none; border-radius:15px; cursor:pointer; margin-top:10px; margin-bottom:40px; }
  .btn-withdraw:hover { background-color:#e67e00; }
  .empty-state { text-align:center; padding:40px 20px; color:#444; font-size:14px; }
  .loading { text-align:center; padding:30px; color:#555; font-size:14px; }
  .bottom-nav { position:fixed; bottom:0; width:100%; background-color:#1a1a1a; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #333; }
  .nav-item { display:flex; flex-direction:column; align-items:center; cursor:pointer; font-size:11px; color:#aaaaaa; gap:4px; }
  .nav-item.active { color:#ff8c00; }
  .nav-icon { font-size:22px; }
  .spacer { height:80px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<nav class="navbar">
  <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
  <h3>My Earnings 💰</h3>
</nav>

<div class="content">

  <div class="total-card">
    <h4>Total Earnings This Month</h4>
    <div class="total-amount" id="monthTotal">₹—</div>
    <div class="total-note" id="monthNote">Loading...</div>
  </div>

  <div class="period-tabs">
    <div class="tab active" id="tab-today"  onclick="selectPeriod('today',  this)">Today</div>
    <div class="tab"        id="tab-week"   onclick="selectPeriod('week',   this)">This Week</div>
    <div class="tab"        id="tab-month"  onclick="selectPeriod('month',  this)">This Month</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3 id="periodEarnings">₹—</h3>
      <p>Earnings</p>
    </div>
    <div class="stat-card">
      <h3 id="periodJobs">—</h3>
      <p>Jobs Done</p>
    </div>
    <div class="stat-card">
      <h3>4.9⭐</h3>
      <p>Avg Rating</p>
    </div>
    <div class="stat-card">
      <h3 id="completionRate">—%</h3>
      <p>Completion Rate</p>
    </div>
  </div>

  <div class="section-title">Recent Jobs</div>
  <div id="jobsList"><div class="loading">⏳ Loading job history...</div></div>

  <button class="btn-withdraw" onclick="withdrawEarnings()">💸 Withdraw Earnings</button>

</div>

<div class="spacer"></div>
<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='dashboard.html'">
    <div class="nav-icon">🏠</div><div>Home</div>
  </div>
  <div class="nav-item active">
    <div class="nav-icon">💰</div><div>Earnings</div>
  </div>
  <div class="nav-item" onclick="window.location.href='profile.html'">
    <div class="nav-icon">👤</div><div>Profile</div>
  </div>
</nav>

<script>
  const SUPABASE_URL = 'https://wenvdgvyuhqdiktetvfj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const workerId = localStorage.getItem('workerId');
  if (!workerId) { window.location.href = 'login.html'; }

  const skillIcons = { 'Plumber':'🔧','Electrician':'⚡','Locksmith':'🔑','AC Repair':'❄️','Carpenter':'🪛','Painter':'🖌️' };
  let allJobs = [];
  let currentPeriod = 'today';

  // Get date boundaries
  function getDateBounds(period) {
    const now = new Date();
    let from;
    if (period === 'today') {
      from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    } else if (period === 'week') {
      from = new Date(now);
      from.setDate(now.getDate() - 7);
    } else {
      from = new Date(now.getFullYear(), now.getMonth(), 1);
    }
    return from.toISOString();
  }

  async function loadAllJobs() {
    try {
      const { data, error } = await db
        .from('jobs')
        .select('*')
        .eq('worker_id', workerId)
        .eq('status', 'completed')
        .order('created_at', { ascending: false })
        .limit(50);

      if (error) throw error;
      allJobs = data || [];
      renderPeriod('today');
      loadMonthTotal();
    } catch (e) {
      document.getElementById('jobsList').innerHTML =
        '<div class="empty-state">⚠️ Error loading jobs: ' + e.message + '</div>';
    }
  }

  async function loadMonthTotal() {
    const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
    const monthJobs  = allJobs.filter(j => j.created_at >= monthStart);
    const total      = monthJobs.reduce((s, j) => s + (j.amount || 0), 0);
    document.getElementById('monthTotal').innerText = '₹' + total.toLocaleString('en-IN');
    document.getElementById('monthNote').innerText  = monthJobs.length + ' jobs this month';
  }

  function selectPeriod(period, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPeriod = period;
    renderPeriod(period);
  }

  function renderPeriod(period) {
    const from    = getDateBounds(period);
    const jobs    = allJobs.filter(j => j.created_at >= from);
    const total   = jobs.reduce((s, j) => s + (j.amount || 0), 0);

    document.getElementById('periodEarnings').innerText = '₹' + total.toLocaleString('en-IN');
    document.getElementById('periodJobs').innerText     = jobs.length;
    document.getElementById('completionRate').innerText = jobs.length > 0 ? '98%' : '—%';

    const container = document.getElementById('jobsList');
    if (jobs.length === 0) {
      container.innerHTML = '<div class="empty-state">No jobs in this period yet</div>';
      return;
    }

    container.innerHTML = jobs.slice(0, 20).map(j => {
      const icon = skillIcons[j.service] || '🔧';
      const date = j.created_at
        ? new Date(j.created_at).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
        : '—';
      return `
        <div class="job-item">
          <div class="job-left">
            <h4>${icon} ${j.service || '—'}</h4>
            <p>${date} • ${j.customer_address || '—'}</p>
          </div>
          <div class="job-right">
            <h4>₹${j.amount || 0}</h4>
            <p>✅ Paid</p>
          </div>
        </div>`;
    }).join('');
  }

  function withdrawEarnings() {
    const from  = getDateBounds('today');
    const today = allJobs.filter(j => j.created_at >= from);
    const total = today.reduce((s, j) => s + (j.amount || 0), 0);
    alert('💸 Withdrawal Request Submitted!\n₹' + total + ' will be credited to your bank account within 24 hours.\n\n(Real bank transfer integration coming soon)');
  }

  loadAllJobs();
</script>
</body>
</html>
