<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Worker — Verify OTP</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0d0d0d; color:#f0f0f0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-box { background-color:#111; border:1px solid #222; border-radius:30px; padding:50px 40px; width:100%; max-width:420px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  .logo { font-size:28px; font-weight:900; color:#00b894; letter-spacing:3px; margin-bottom:10px; }
  .tagline { font-size:14px; color:#aaa; margin-bottom:40px; }
  h2 { font-size:24px; font-weight:800; margin-bottom:10px; color:#f0f0f0; }
  .subtitle { font-size:14px; color:#888; margin-bottom:5px; }
  .phone-display { font-size:16px; font-weight:800; color:#00b894; margin-bottom:30px; }
  .otp-inputs { display:flex; justify-content:center; gap:12px; margin-bottom:15px; }
  .otp-inputs input { width:52px; height:52px; background-color:#f0f0f0; border:2px solid #222; border-radius:15px; color:#f0f0f0; font-size:24px; font-weight:800; text-align:center; outline:none; transition:border-color 0.2s; }
  .otp-inputs input:focus { border-color:#00b894; }
  .otp-inputs input.err { border-color:#e74c3c; }
  .field-err { color:#e74c3c; font-size:13px; margin-bottom:20px; display:none; }
  .btn-main { width:100%; padding:18px; background-color:#00b894; color:#fff; font-size:18px; font-weight:800; border:none; border-radius:15px; cursor:pointer; margin-bottom:20px; transition:background-color 0.2s; }
  .btn-main:hover { background-color:#009e7f; }
  .btn-main:disabled { background-color:#ccc; cursor:not-allowed; }
  .resend { font-size:14px; color:#888; }
  .resend span { color:#00b894; cursor:pointer; font-weight:700; }
  .resend-msg { font-size:13px; color:#00b894; margin-top:8px; display:none; }
</style>

<div class="login-box">
  <div class="logo">ZIPFIX</div>
  <div class="tagline">Worker Portal — Earn Near You</div>
  <h2>Verify your number</h2>
  <p class="subtitle">OTP sent to</p>
  <div class="phone-display" id="phoneDisplay">+91 XXXXXXXXXX</div>

  <div class="otp-inputs">
    <input type="number" id="o1" maxlength="1" />
    <input type="number" id="o2" maxlength="1" />
    <input type="number" id="o3" maxlength="1" />
    <input type="number" id="o4" maxlength="1" />
    <input type="number" id="o5" maxlength="1" />
    <input type="number" id="o6" maxlength="1" />
  </div>
  <div class="field-err" id="otpErr">Please enter all 6 digits</div>

  <button class="btn-main" id="verifyBtn" onclick="verifyOTP()">Verify & Continue</button>
  <p class="resend">Didn't receive OTP? <span onclick="resendOtp()">Resend</span></p>
  <div class="resend-msg" id="resendMsg">✅ OTP resent!</div>
</div>

<script>
  if (!localStorage.getItem('workerPhone') && !localStorage.getItem('workerName')) {
    window.location.href = 'login.html';
  }
  if (localStorage.getItem('adminLoggedIn')) { window.location.href = '../admin/index.html'; }

  const phone = localStorage.getItem('workerPhone') || '';
  document.getElementById('phoneDisplay').innerText = phone || '+91 XXXXXXXXXX';

  const inputs = [document.getElementById('o1'),document.getElementById('o2'),document.getElementById('o3'),document.getElementById('o4'),document.getElementById('o5'),document.getElementById('o6')];
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', function() {
      if (this.value.length > 1) this.value = this.value.slice(0,1);
      document.getElementById('otpErr').style.display = 'none';
      inputs.forEach(x => x.classList.remove('err'));
      if (this.value && i < 5) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) inputs[i-1].focus();
    });
  });
  setTimeout(() => inputs[0].focus(), 100);

  function verifyOTP() {
    let otp = inputs.map(i => i.value).join('');
    if (otp.length < 6) {
      document.getElementById('otpErr').style.display = 'block';
      inputs.forEach(i => { if (!i.value) i.classList.add('err'); });
      return;
    }
    const btn = document.getElementById('verifyBtn');
    btn.innerText = 'Verifying...'; btn.disabled = true;
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
  }

  function resendOtp() {
    document.getElementById('resendMsg').style.display = 'block';
    setTimeout(() => document.getElementById('resendMsg').style.display = 'none', 3000);
    inputs.forEach(i => i.value = ''); inputs[0].focus();
  }
</script>
</body>
</html>
