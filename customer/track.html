<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Track Worker</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; display:flex; flex-direction:column; }
  .navbar { display:flex; align-items:center; padding:20px 30px; background-color:#fffdf7; border-bottom:1px solid #ede9df; gap:15px; z-index:10; }
  .back-btn { font-size:22px; cursor:pointer; color:#00b894; }
  .navbar h3 { font-size:20px; font-weight:800; color:#1a1a1a; }
  .map-container { flex:1; position:relative; background-color:#e8f4e8; min-height:400px; overflow:hidden; }
  .map-grid { position:absolute; width:100%; height:100%; background-image:linear-gradient(rgba(0,184,148,0.07) 1px, transparent 1px),linear-gradient(90deg, rgba(0,184,148,0.07) 1px, transparent 1px); background-size:40px 40px; }
  .map-road-h { position:absolute; height:8px; background-color:rgba(255,255,255,0.5); width:100%; }
  .map-road-v { position:absolute; width:8px; background-color:rgba(255,255,255,0.5); height:100%; }
  .customer-pin { position:absolute; bottom:30%; left:50%; transform:translateX(-50%); text-align:center; z-index:5; }
  .customer-pin .pin-icon { font-size:35px; }
  .customer-pin .pin-label { background-color:#00b894; color:#fff; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; margin-top:4px; }
  .worker-pin { position:absolute; text-align:center; z-index:5; transition:all 1s ease; }
  .worker-pin .pin-icon { font-size:35px; }
  .worker-pin .pin-label { background-color:#f39c12; color:#fff; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; margin-top:4px; }
  .eta-badge { position:absolute; top:20px; left:50%; transform:translateX(-50%); background-color:#fffdf7; border:2px solid #00b894; border-radius:50px; padding:10px 25px; font-size:15px; font-weight:800; color:#00b894; z-index:10; white-space:nowrap; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
  .bottom-sheet { background-color:#fffdf7; border-radius:30px 30px 0 0; border-top:1px solid #ede9df; padding:25px 25px 40px 25px; z-index:10; }
  .worker-row { display:flex; align-items:center; gap:15px; margin-bottom:20px; }
  .worker-avatar { width:55px; height:55px; background-color:#00b894; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff; flex-shrink:0; }
  .worker-info h4 { font-size:17px; font-weight:800; color:#1a1a1a; }
  .worker-info p { font-size:13px; color:#888; margin-top:3px; }
  .action-row { display:flex; gap:12px; margin-bottom:15px; }
  .action-btn { flex:1; padding:15px; border-radius:15px; border:none; font-size:14px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-call { background-color:#e8f8f4; color:#00b894; }
  .btn-chat { background-color:#eef4ff; color:#3b82f6; }
  .btn-sos  { background-color:#fff0ee; color:#e74c3c; }
  .progress-bar { background-color:#ede9df; border-radius:10px; height:6px; overflow:hidden; }
  .progress-fill { height:100%; background-color:#00b894; border-radius:10px; width:10%; transition:width 1s ease; }
  .progress-text { display:flex; justify-content:space-between; font-size:12px; color:#888; margin-top:8px; }
</style>

<nav class="navbar">
  <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
  <h3>Worker On The Way 🚗</h3>
</nav>

<div class="map-container">
  <div class="map-grid"></div>
  <div class="map-road-h" style="top:30%"></div>
  <div class="map-road-h" style="top:55%"></div>
  <div class="map-road-h" style="top:75%"></div>
  <div class="map-road-v" style="left:25%"></div>
  <div class="map-road-v" style="left:60%"></div>
  <div class="map-road-v" style="left:80%"></div>
  <div class="eta-badge" id="etaBadge">⏱️ Arriving in 12 mins</div>
  <div class="customer-pin"><div class="pin-icon">🏠</div><div class="pin-label">You</div></div>
  <div class="worker-pin" id="workerPin" style="top:15%;left:20%">
    <div class="pin-icon">👷</div>
    <div class="pin-label" id="workerPinLabel">Worker</div>
  </div>
</div>

<div class="bottom-sheet">
  <div class="worker-row">
    <div class="worker-avatar" id="workerAvatar">R</div>
    <div class="worker-info">
      <h4 id="workerName">Ravi Kumar</h4>
      <p>⭐ 4.9 • Verified Worker • On the way</p>
    </div>
  </div>
  <div class="action-row">
    <button class="action-btn btn-call" onclick="callWorker()">📞 Call</button>
    <button class="action-btn btn-chat" onclick="chatWorker()">💬 Chat</button>
    <button class="action-btn btn-sos"  onclick="sosAlert()">🚨 SOS</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text"><span>Worker dispatched</span><span id="progressPercent">10%</span></div>
</div>

<script>
  if (!localStorage.getItem('phoneNumber')) { window.location.href = 'login.html'; }
  if (localStorage.getItem('adminLoggedIn')) { window.location.href = '../admin/index.html'; }

  const workerName    = localStorage.getItem('workerName')    || 'Ravi Kumar';
  const workerInitial = localStorage.getItem('workerInitial') || 'R';
  document.getElementById('workerName').innerText     = workerName;
  document.getElementById('workerAvatar').innerText   = workerInitial;
  document.getElementById('workerPinLabel').innerText = workerName.split(' ')[0];

  let eta = 12, progress = 10, posIndex = 0;
  const workerPin = document.getElementById('workerPin');
  const positions = [
    {top:'15%',left:'20%'},{top:'20%',left:'30%'},{top:'30%',left:'35%'},
    {top:'30%',left:'45%'},{top:'40%',left:'50%'},{top:'50%',left:'52%'},{top:'55%',left:'50%'},
  ];

  const moveInterval = setInterval(function() {
    if (posIndex < positions.length) {
      workerPin.style.top  = positions[posIndex].top;
      workerPin.style.left = positions[posIndex].left;
      posIndex++;
      eta = Math.max(0, eta - 2);
      progress = Math.min(100, progress + 13);
      document.getElementById('etaBadge').innerText = eta === 0 ? '✅ Worker Arrived!' : '⏱️ Arriving in ' + eta + ' mins';
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressPercent').innerText = progress + '%';
      if (eta === 0) { clearInterval(moveInterval); setTimeout(function() { window.location.href = 'payment.html'; }, 2000); }
    }
  }, 3000);

  function callWorker() { alert('📞 Calling ' + workerName + '...\n(Real calling after backend connection)'); }
  function chatWorker() { alert('💬 Chat with ' + workerName + '\n(Real chat coming soon!)'); }
  function sosAlert() {
    if (confirm('🚨 Trigger Emergency SOS?\nThis alerts our response team immediately!')) {
      alert('🚨 SOS Activated!\nTeam alerted. Stay calm. Help is coming!');
    }
  }
</script>
</body>
</html>
