<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Emergency Help In Minutes</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0f0f0f; color:white; min-height:100vh; }

  .navbar {
    display:flex; justify-content:space-between; align-items:center;
    padding:20px 30px; background-color:#1a1a1a;
  }
  .logo { font-size:26px; font-weight:900; color:#00d4ff; letter-spacing:3px; }
  .btn-login {
    padding:12px 28px; background-color:transparent; color:#00d4ff;
    font-size:15px; font-weight:800; border:2px solid #00d4ff;
    border-radius:50px; cursor:pointer; transition:all 0.2s;
  }
  .btn-login:hover { background-color:#00d4ff; color:#0f0f0f; }

  .hero {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center;
    padding:80px 25px;
    min-height:calc(100vh - 72px);
  }
  .badge {
    display:inline-flex; align-items:center; gap:8px;
    background-color:#001a2a; border:1px solid #00d4ff44;
    border-radius:50px; padding:8px 18px; margin-bottom:28px;
    font-size:13px; font-weight:700; color:#00d4ff;
  }
  .hero h1 {
    font-size:clamp(38px, 9vw, 62px); font-weight:900;
    line-height:1.15; margin-bottom:20px;
  }
  .hero h1 span { color:#00d4ff; }
  .hero p {
    font-size:16px; color:#aaaaaa; max-width:360px;
    line-height:1.7; margin-bottom:40px;
  }
  .hero-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .btn-primary {
    padding:17px 38px; background-color:#00d4ff; color:#0f0f0f;
    font-size:17px; font-weight:900; border:none; border-radius:50px;
    cursor:pointer; transition:background-color 0.2s;
  }
  .btn-primary:hover { background-color:#00b8d9; }
  .btn-secondary {
    padding:17px 38px; background-color:transparent; color:white;
    font-size:17px; font-weight:800; border:2px solid #333;
    border-radius:50px; cursor:pointer; transition:border-color 0.2s;
  }
  .btn-secondary:hover { border-color:#00d4ff; color:#00d4ff; }
</style>

<nav class="navbar">
  <div class="logo">ZIPFIX</div>
  <button class="btn-login" onclick="window.location.href='customer/login.html'">Login</button>
</nav>

<section class="hero">
  <div class="badge">⚡ Available 24/7 in Hyderabad</div>
  <h1>Emergency Help<br/><span>In Minutes.</span></h1>
  <p>Plumber, Electrician, Locksmith — verified workers at your doorstep. Any time. Any emergency.</p>
  <div class="hero-btns">
    <button class="btn-primary" onclick="window.location.href='customer/login.html'">🚀 Book a Service Now</button>
    <button class="btn-secondary" onclick="window.location.href='customer/register.html'">Create Account</button>
  </div>
</section>

<script>
  if (localStorage.getItem('phoneNumber') && localStorage.getItem('userName')) {
    window.location.href = 'customer/dashboard.html';
  }
</script>
</body>
</html>
