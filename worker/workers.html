<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Admin — Workers</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; }
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:18px 25px; background-color:#fffdf7; border-bottom:1px solid #ede9df; }
  .logo { font-size:22px; font-weight:900; color:#00b894; letter-spacing:2px; }
  .back-btn { font-size:14px; color:#888; cursor:pointer; font-weight:700; }
  .back-btn:hover { color:#00b894; }
  .content { padding:25px; max-width:700px; margin:0 auto; }
  .tabs { display:flex; gap:10px; margin-bottom:25px; }
  .tab { padding:10px 22px; border-radius:50px; font-size:14px; font-weight:700; cursor:pointer; border:2px solid #ede9df; background:#fffdf7; color:#888; transition:all 0.2s; }
  .tab.active { background:#00b894; color:#fff; border-color:#00b894; }
  .tab .count { background:rgba(255,255,255,0.3); border-radius:50px; padding:2px 8px; margin-left:6px; font-size:12px; }
  .tab:not(.active) .count { background:#f2efe8; color:#888; }
  .worker-card { background-color:#fffdf7; border:1px solid #ede9df; border-radius:20px; padding:20px 22px; margin-bottom:15px; }
  .worker-card.pending-card { border-left:4px solid #f0c040; }
  .worker-card.approved-card { border-left:4px solid #00b894; }
  .worker-card.rejected-card { border-left:4px solid #e74c3c; opacity:0.7; }
  .worker-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .worker-name { font-size:17px; font-weight:800; }
  .worker-skill { font-size:13px; color:#888; margin-top:3px; }
  .status-badge { padding:5px 14px; border-radius:50px; font-size:12px; font-weight:800; }
  .badge-pending  { background:#fffbe6; color:#886600; border:1px solid #f0c040; }
  .badge-approved { background:#e8f8f4; color:#00b894; border:1px solid #00b89433; }
  .badge-rejected { background:#fff0f0; color:#c0392b; border:1px solid #e74c3c33; }
  .worker-details { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px; }
  .detail-item { font-size:13px; color:#888; }
  .detail-item strong { color:#1a1a1a; display:block; font-size:14px; }
  .worker-actions { display:flex; gap:10px; }
  .btn-approve { flex:2; padding:12px; background-color:#00b894; color:#fff; font-size:15px; font-weight:800; border:none; border-radius:12px; cursor:pointer; transition:background-color 0.2s; }
  .btn-approve:hover { background-color:#009e7f; }
  .btn-reject { flex:1; padding:12px; background-color:#fff0f0; color:#e74c3c; font-size:15px; font-weight:800; border:2px solid #e74c3c33; border-radius:12px; cursor:pointer; transition:all 0.2s; }
  .btn-reject:hover { background-color:#e74c3c; color:#fff; }
  .btn-approved-done { flex:1; padding:12px; background-color:#f2efe8; color:#aaa; font-size:14px; font-weight:700; border:none; border-radius:12px; cursor:default; }
  .empty-state { text-align:center; padding:50px 20px; color:#aaa; font-size:15px; }
  .empty-state .icon { font-size:50px; margin-bottom:15px; }
  .loading { text-align:center; padding:40px; color:#aaa; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:14px 25px; border-radius:50px; font-size:14px; font-weight:700; display:none; z-index:999; }
  .toast.show { display:block; animation:fadeInOut 3s ease forwards; }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<nav class="navbar">
  <div class="logo">ZIPFIX</div>
  <div class="back-btn" onclick="window.location.href='index.html'">← Dashboard</div>
</nav>

<div class="content">
  <div class="tabs">
    <div class="tab active" id="tab-pending"  onclick="switchTab('pending')">Pending <span class="count" id="countPending">0</span></div>
    <div class="tab"        id="tab-approved" onclick="switchTab('approved')">Approved <span class="count" id="countApproved">0</span></div>
    <div class="tab"        id="tab-rejected" onclick="switchTab('rejected')">Rejected <span class="count" id="countRejected">0</span></div>
  </div>
  <div id="workersList"><div class="loading">⏳ Loading workers...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://wenvdgvyuhqdiktetvfj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Fast2SMS API Key — replace with your actual key from fast2sms.com
  const FAST2SMS_KEY = 'YOUR_FAST2SMS_API_KEY';

  if (!localStorage.getItem('adminLoggedIn')) { window.location.href = 'login.html'; }

  let allWorkers = [];
  let currentTab = 'pending';

  const skillIcons = { 'Plumber':'🔧','Electrician':'⚡','Locksmith':'🔑','AC Repair':'❄️','Carpenter':'🪛','Painter':'🖌️' };

  async function loadWorkers() {
    try {
      const { data, error } = await db.from('workers').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      allWorkers = data || [];
      updateCounts();
      renderTab(currentTab);
    } catch(e) {
      document.getElementById('workersList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Error loading workers: '+e.message+'</p></div>';
    }
  }

  function updateCounts() {
    document.getElementById('countPending').innerText  = allWorkers.filter(w=>w.status==='pending').length;
    document.getElementById('countApproved').innerText = allWorkers.filter(w=>w.status==='approved').length;
    document.getElementById('countRejected').innerText = allWorkers.filter(w=>w.status==='rejected').length;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    renderTab(tab);
  }

  function renderTab(tab) {
    const workers = allWorkers.filter(w => w.status === tab);
    const container = document.getElementById('workersList');
    if (workers.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">'+( tab==='pending'?'⏳':tab==='approved'?'✅':'❌')+'</div><p>No '+tab+' workers</p></div>';
      return;
    }
    container.innerHTML = workers.map(w => {
      const icon = skillIcons[w.skill] || '🔧';
      const date = w.created_at ? new Date(w.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
      const actions = tab === 'pending'
        ? `<button class="btn-approve" onclick="approveWorker('${w.id}','${w.name}','${w.phone}')">✅ Approve</button>
           <button class="btn-reject"  onclick="rejectWorker('${w.id}','${w.name}','${w.phone}')">✗ Reject</button>`
        : tab === 'approved'
        ? `<button class="btn-approved-done">✅ Approved</button>
           <button class="btn-reject" onclick="rejectWorker('${w.id}','${w.name}','${w.phone}')">Revoke</button>`
        : `<button class="btn-approve" onclick="approveWorker('${w.id}','${w.name}','${w.phone}')">Re-Approve</button>`;

      return `
        <div class="worker-card ${tab}-card">
          <div class="worker-top">
            <div>
              <div class="worker-name">${icon} ${w.name || '—'}</div>
              <div class="worker-skill">${w.skill || '—'} • ${w.area || '—'}</div>
            </div>
            <div class="status-badge badge-${tab}">${tab.charAt(0).toUpperCase()+tab.slice(1)}</div>
          </div>
          <div class="worker-details">
            <div class="detail-item"><strong>${w.phone || '—'}</strong>Phone</div>
            <div class="detail-item"><strong>${w.experience || '—'}</strong>Experience</div>
            <div class="detail-item"><strong>${w.id_type || '—'}: ${w.id_number || '—'}</strong>ID</div>
            <div class="detail-item"><strong>${w.worker_id || 'Not assigned'}</strong>Worker ID</div>
            <div class="detail-item"><strong>${date}</strong>Applied</div>
          </div>
          <div class="worker-actions">${actions}</div>
        </div>`;
    }).join('');
  }

  async function approveWorker(id, name, phone) {
    if (!confirm('Approve '+name+'?')) return;

    // Generate worker ID
    const workerId = 'ZF-' + Math.floor(1000 + Math.random() * 9000);

    try {
      const { error } = await db.from('workers').update({ status: 'approved', worker_id: workerId }).eq('id', id);
      if (error) throw error;

      // Send SMS via Fast2SMS
      await sendSMS(phone, 'Congratulations! Your ZipFix Worker application has been approved. Your Worker ID is: ' + workerId + '. Login at zipfix.vercel.app/worker/login.html');

      showToast('✅ '+name+' approved! Worker ID: '+workerId+' | SMS sent');
      await loadWorkers();
    } catch(e) {
      alert('Error: '+e.message);
    }
  }

  async function rejectWorker(id, name, phone) {
    if (!confirm('Reject '+name+'? They will be notified via SMS.')) return;
    try {
      const { error } = await db.from('workers').update({ status: 'rejected' }).eq('id', id);
      if (error) throw error;

      // Send SMS via Fast2SMS
      await sendSMS(phone, 'We regret to inform you that your ZipFix Worker application has been rejected. Please contact help@zipfix.com for more details.');

      showToast('❌ '+name+' rejected | SMS sent');
      await loadWorkers();
    } catch(e) {
      alert('Error: '+e.message);
    }
  }

  async function sendSMS(phone, message) {
    // phone format is +919876543210 — extract 10 digit number
    const number = phone.replace('+91', '').replace(/\D/g,'');
    try {
      await fetch('https://www.fast2sms.com/dev/bulkV2?authorization='+FAST2SMS_KEY+'&route=q&message='+encodeURIComponent(message)+'&language=english&flash=0&numbers='+number, {
        method: 'GET'
      });
    } catch(e) {
      console.warn('SMS failed (non-critical):', e.message);
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.remove('show');
    void t.offsetWidth;
    t.classList.add('show');
  }

  loadWorkers();
</script>
</body>
</html>
