<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Verify OTP</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .otp-box { background-color:#fffdf7; border:1px solid #ede9df; border-radius:30px; padding:50px 40px; width:100%; max-width:420px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  .logo { font-size:28px; font-weight:900; color:#00b894; letter-spacing:3px; margin-bottom:10px; }
  .tagline { font-size:14px; color:#aaa; margin-bottom:30px; }
  h2 { font-size:24px; font-weight:800; margin-bottom:10px; color:#1a1a1a; }
  .subtitle { font-size:14px; color:#888; margin-bottom:5px; }
  .phone-display { font-size:16px; font-weight:800; color:#00b894; margin-bottom:25px; }
  .otp-inputs { display:flex; justify-content:center; gap:12px; margin-bottom:12px; }
  .otp-inputs input {
    width:55px; height:55px; background-color:#f2efe8; border:2px solid #ede9df;
    border-radius:15px; color:#1a1a1a; font-size:24px; font-weight:800;
    text-align:center; outline:none; transition:border-color 0.2s;
  }
  .otp-inputs input:focus { border-color:#00b894; }
  .otp-inputs input.err { border-color:#e74c3c; animation:shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .inline-err { color:#e74c3c; font-size:13px; margin-bottom:18px; min-height:20px; }
  .btn-main { width:100%; padding:18px; background-color:#00b894; color:#fff; font-size:18px; font-weight:800; border:none; border-radius:15px; cursor:pointer; margin-bottom:20px; transition:background-color 0.2s; }
  .btn-main:hover { background-color:#009e7f; }
  .btn-main:disabled { background-color:#ccc; cursor:not-allowed; }
  .resend { font-size:14px; color:#888; }
  .resend span { color:#00b894; cursor:pointer; font-weight:700; }
  .resend-msg { font-size:13px; color:#00b894; margin-top:10px; min-height:20px; }
  .clear-link { color:#bbb; font-size:11px; cursor:pointer; margin-top:15px; display:inline-block; }
</style>

<div class="otp-box">
  <div class="logo">ZIPFIX</div>
  <div class="tagline">Emergency help in minutes</div>
  <h2>Verify your number</h2>
  <p class="subtitle">OTP sent to</p>
  <div class="phone-display" id="phoneDisplay">+91 XXXXXXXXXX</div>
  <div class="otp-inputs">
    <input type="number" id="otp1" maxlength="1" />
    <input type="number" id="otp2" maxlength="1" />
    <input type="number" id="otp3" maxlength="1" />
    <input type="number" id="otp4" maxlength="1" />
    <input type="number" id="otp5" maxlength="1" />
    <input type="number" id="otp6" maxlength="1" />
  </div>
  <div class="inline-err" id="otpErr"></div>
  <button class="btn-main" id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>
  <p class="resend">Didn't receive OTP? <span onclick="resendOTP()">Resend</span></p>
  <div class="resend-msg" id="resendMsg"></div>
  <div class="clear-link" onclick="clearAll()">🗑️ Clear Storage (Testing Only)</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const phone = localStorage.getItem('phoneNumber') || '';
  document.getElementById('phoneDisplay').innerText = '+91 ' + phone;

  const inputs = document.querySelectorAll('.otp-inputs input');
  inputs.forEach((input, index) => {
    input.addEventListener('input', function () {
      if (this.value.length > 1) this.value = this.value.slice(0, 1);
      document.getElementById('otpErr').innerText = '';
      inputs.forEach(i => i.classList.remove('err'));
      if (this.value && index < inputs.length - 1) inputs[index + 1].focus();
    });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace' && !this.value && index > 0) inputs[index - 1].focus();
    });
  });

  window.addEventListener('load', () => { setTimeout(() => inputs[0].focus(), 150); });

  async function verifyOTP() {
    let otp = '';
    inputs.forEach(i => { otp += i.value; });
    if (otp.length < 6) {
      document.getElementById('otpErr').innerText = 'Please enter all 6 digits';
      inputs.forEach(i => { if (!i.value) i.classList.add('err'); });
      return;
    }
    const btn = document.getElementById('verifyBtn');
    btn.innerText = 'Verifying...';
    btn.disabled = true;
    try {
      const db = supabase.createClient(
        'https://wenvdgvyuhqdiktetvfj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4'
      );
      const { data } = await db.from('users').select('name, email, area').eq('phone', '+91' + phone).single();
      if (data && data.name) {
        localStorage.setItem('userName',  data.name  || '');
        localStorage.setItem('userEmail', data.email || '');
        localStorage.setItem('userArea',  data.area  || '');
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'register.html';
      }
    } catch (e) {
      const isRegistered = localStorage.getItem('userName');
      window.location.href = isRegistered ? 'dashboard.html' : 'register.html';
    }
  }

  function resendOTP() {
    document.getElementById('resendMsg').innerText = '✅ OTP resent to +91 ' + phone;
    inputs.forEach(i => i.value = '');
    inputs[0].focus();
    setTimeout(() => { document.getElementById('resendMsg').innerText = ''; }, 3000);
  }

  function clearAll() {
    localStorage.clear();
    document.getElementById('resendMsg').innerText = '🗑️ Storage cleared!';
    setTimeout(() => { document.getElementById('resendMsg').innerText = ''; }, 2000);
  }
</script>
</body>
</html>
