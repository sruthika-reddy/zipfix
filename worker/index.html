<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Worker — Earn Money Near You</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; }

  .navbar {
    display:flex; justify-content:space-between; align-items:center;
    padding:20px 30px; background-color:#fffdf7; border-bottom:1px solid #ede9df;
  }
  .logo { font-size:26px; font-weight:900; color:#00b894; letter-spacing:3px; }
  .btn-login {
    padding:12px 28px; background-color:transparent; color:#00b894;
    font-size:15px; font-weight:800; border:2px solid #00b894;
    border-radius:50px; cursor:pointer; transition:all 0.2s;
  }
  .btn-login:hover { background-color:#00b894; color:#fff; }

  .hero {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center;
    padding:80px 25px;
    min-height:calc(100vh - 72px);
  }
  .badge {
    display:inline-flex; align-items:center; gap:8px;
    background-color:#e8f8f4; border:1px solid #00b89444;
    border-radius:50px; padding:8px 18px; margin-bottom:28px;
    font-size:13px; font-weight:700; color:#00b894;
  }
  .hero h1 {
    font-size:clamp(38px, 9vw, 62px); font-weight:900;
    line-height:1.15; margin-bottom:20px; color:#1a1a1a;
  }
  .hero h1 span { color:#00b894; }
  .hero p {
    font-size:16px; color:#888; max-width:360px;
    line-height:1.7; margin-bottom:40px;
  }
  .hero-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .btn-primary {
    padding:17px 38px; background-color:#00b894; color:#fff;
    font-size:17px; font-weight:900; border:none; border-radius:50px;
    cursor:pointer; transition:background-color 0.2s;
  }
  .btn-primary:hover { background-color:#009e7f; }
  .btn-secondary {
    padding:17px 38px; background-color:transparent; color:#555;
    font-size:17px; font-weight:800; border:2px solid #ccc8bc;
    border-radius:50px; cursor:pointer; transition:all 0.2s;
  }
  .btn-secondary:hover { border-color:#00b894; color:#00b894; }

  .status-link { margin-top:22px; font-size:14px; color:#aaa; }
  .status-link span { color:#00b894; cursor:pointer; font-weight:700; }
</style>

<nav class="navbar">
  <div class="logo">ZIPFIX</div>
  <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
</nav>

<section class="hero">
  <div class="badge">👷 Worker Portal</div>
  <h1>Earn Money Doing<br/><span>What You Do Best.</span></h1>
  <p>Join ZipFix — get paid jobs from customers near you, 24/7. Plumber, Electrician, Locksmith & more.</p>
  <div class="hero-btns">
    <button class="btn-primary" onclick="window.location.href='register.html'">🚀 Apply to Join</button>
    <button class="btn-secondary" onclick="window.location.href='login.html'">Already a Worker?</button>
  </div>
  <div class="status-link">
    Already applied? <span onclick="window.location.href='status.html'">Check your status →</span>
  </div>
</section>

<script>
  if (localStorage.getItem('workerName') && localStorage.getItem('workerId')) {
    window.location.href = 'dashboard.html';
  }
  if (localStorage.getItem('adminLoggedIn')) {
    window.location.href = '../admin/index.html';
  }
</script>
</body>
</html>
