<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Admin — Jobs & Complaints</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; }

  /* Navbar */
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:18px 25px; background-color:#fffdf7; border-bottom:1px solid #ede9df; position:sticky; top:0; z-index:100; }
  .nav-left { display:flex; align-items:center; gap:14px; }
  .back-btn { font-size:22px; color:#00b894; cursor:pointer; font-weight:700; text-decoration:none; }
  .nav-brand .logo { font-size:20px; font-weight:900; color:#00b894; letter-spacing:2px; }
  .nav-brand .tag  { font-size:11px; color:#aaa; margin-top:1px; }
  .logout-btn { padding:10px 20px; background-color:#f2efe8; color:#888; font-size:14px; font-weight:700; border:none; border-radius:50px; cursor:pointer; transition:all 0.2s; }
  .logout-btn:hover { background-color:#e74c3c; color:#fff; }

  .content { padding:25px; }

  /* Tabs */
  .tabs { display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; }
  .tab { flex:1; min-width:70px; padding:12px 8px; background-color:#fffdf7; border:2px solid #ede9df; border-radius:14px; text-align:center; cursor:pointer; font-size:12px; font-weight:800; color:#888; transition:all 0.2s; white-space:nowrap; }
  .tab.active { border-color:#00b894; color:#00b894; background-color:#e8f8f4; }
  .tab-count { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; border-radius:50px; padding:0 4px; font-size:10px; font-weight:900; margin-left:4px; background-color:#00b894; color:#fff; }
  .tab-count.orange { background-color:#e67e00; }
  .tab-count.red    { background-color:#e74c3c; }
  .tab-count.blue   { background-color:#3b82f6; }

  /* Job card */
  .job-card { background-color:#fffdf7; border:1px solid #ede9df; border-radius:20px; padding:20px; margin-bottom:14px; }
  .jc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .jc-service { font-size:18px; font-weight:900; }
  .jc-status { padding:6px 13px; border-radius:50px; font-size:12px; font-weight:800; }
  .js-completed { background:#e8f8f4; color:#00b894; }
  .js-pending   { background:#fff8e6; color:#e67e00; }
  .js-cancelled { background:#fff0ee; color:#e74c3c; }
  .js-accepted  { background:#eef4ff; color:#3b82f6; }

  .jc-details { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .detail-item { font-size:12px; color:#888; }
  .detail-item strong { display:block; font-size:13px; color:#1a1a1a; font-weight:700; margin-top:2px; }

  .jc-problem { background-color:#f2efe8; border-radius:12px; padding:12px 14px; font-size:14px; color:#555; line-height:1.6; margin-bottom:12px; font-style:italic; }

  .jc-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn-complete { padding:12px 18px; background-color:#00b894; color:#fff; font-size:14px; font-weight:800; border:none; border-radius:12px; cursor:pointer; transition:background-color 0.2s; }
  .btn-complete:hover { background-color:#009e7f; }
  .btn-call     { padding:12px 18px; background-color:#e8f8f4; color:#00b894; font-size:14px; font-weight:800; border:2px solid #00b89433; border-radius:12px; cursor:pointer; }
  .btn-dismiss  { padding:12px 18px; background-color:#f2efe8; color:#888; font-size:13px; font-weight:700; border:none; border-radius:12px; cursor:pointer; }

  .jc-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .jc-date   { font-size:11px; color:#aaa; }
  .jc-amount { font-size:15px; font-weight:900; color:#00b894; }

  .empty-state { text-align:center; padding:50px 20px; color:#aaa; }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }
  .loading-note { text-align:center; padding:40px; color:#aaa; font-size:14px; }
  .spacer { height:30px; }

  /* Toast */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background-color:#00b894; color:#fff; padding:14px 24px; border-radius:50px; font-size:14px; font-weight:700; z-index:9999; display:none; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div class="toast" id="toast"></div>

<nav class="navbar">
  <div class="nav-left">
    <a class="back-btn" href="index.html">←</a>
    <div class="nav-brand">
      <div class="logo">ZIPFIX</div>
      <div class="tag">Jobs & Complaints</div>
    </div>
  </div>
  <button class="logout-btn" onclick="adminLogout()">Logout</button>
</nav>

<div class="content">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('all',this)">
      All <span class="tab-count" id="cnt-all">0</span>
    </div>
    <div class="tab" onclick="switchTab('pending',this)">
      Pending <span class="tab-count orange" id="cnt-pending">0</span>
    </div>
    <div class="tab" onclick="switchTab('accepted',this)">
      Live <span class="tab-count blue" id="cnt-accepted">0</span>
    </div>
    <div class="tab" onclick="switchTab('completed',this)">
      Done <span class="tab-count" id="cnt-completed">0</span>
    </div>
    <div class="tab" onclick="switchTab('cancelled',this)">
      Cancelled <span class="tab-count red" id="cnt-cancelled">0</span>
    </div>
  </div>

  <div id="jobList"><div class="loading-note">⏳ Loading jobs...</div></div>
  <div class="spacer"></div>
</div>

<script>
  const SUPABASE_URL = 'https://wenvdgvyuhqdiktetvfj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const SESSION_MS = 8 * 60 * 60 * 1000;
  if (!localStorage.getItem('adminLoggedIn')) { window.location.href = 'login.html'; }
  if (Date.now() - parseInt(localStorage.getItem('adminLoginTime')||0) > SESSION_MS) {
    localStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html';
  }

  const icons = { Plumber:'🔧', Electrician:'⚡', Locksmith:'🔑', 'AC Repair':'❄️', Carpenter:'🪛', Painter:'🖌️', 'Pest Control':'🐛', 'Home Cleaning':'🧹', 'TV / Electronics Repair':'📺', 'Water Purifier Service':'🫧', 'Appliance Repair':'🔩', 'Bathroom Renovation':'🛁', 'Packers & Movers':'📦', 'CCTV Installation':'🔒' };

  let allJobs = [], currentTab = 'all';

  async function loadJobs() {
    try {
      const { data, error } = await db.from('jobs').select('*').order('created_at', { ascending:false });
      if (error) throw error;
      allJobs = data || [];
      updateCounts();
      renderTab(currentTab);
    } catch (e) {
      document.getElementById('jobList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>' + e.message + '</p></div>';
    }
  }

  function updateCounts() {
    document.getElementById('cnt-all').innerText       = allJobs.length;
    document.getElementById('cnt-pending').innerText   = allJobs.filter(j=>j.status==='pending').length;
    document.getElementById('cnt-accepted').innerText  = allJobs.filter(j=>j.status==='accepted'||j.status==='in_progress').length;
    document.getElementById('cnt-completed').innerText = allJobs.filter(j=>j.status==='completed').length;
    document.getElementById('cnt-cancelled').innerText = allJobs.filter(j=>j.status==='cancelled').length;
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderTab(tab);
  }

  function renderTab(tab) {
    const jobs = tab === 'all' ? allJobs : allJobs.filter(j => {
      if (tab === 'accepted') return j.status === 'accepted' || j.status === 'in_progress';
      return j.status === tab;
    });
    const el = document.getElementById('jobList');
    if (!jobs.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No jobs in this category</p></div>';
      return;
    }
    el.innerHTML = jobs.map(j => buildCard(j)).join('');
  }

  function buildCard(j) {
    const ico  = icons[j.service] || '🔧';
    const date = j.created_at ? new Date(j.created_at).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
    const sc   = 'js-' + (j.status === 'in_progress' ? 'accepted' : (j.status || 'pending'));
    const sl   = { pending:'⏳ Pending', accepted:'🔵 Live', in_progress:'🔵 In Progress', completed:'✅ Done', cancelled:'❌ Cancelled' }[j.status] || j.status;
    const phone = (j.customer_phone||'').replace('+91','');

    const canComplete = j.status === 'accepted' || j.status === 'pending' || j.status === 'in_progress';

    return `<div class="job-card" id="jcard-${j.id}">
      <div class="jc-header">
        <div class="jc-service">${ico} ${j.service || '—'}</div>
        <div class="jc-status ${sc}">${sl}</div>
      </div>
      <div class="jc-details">
        <div class="detail-item">👤 Customer<strong>${j.customer_name||'—'}</strong></div>
        <div class="detail-item">📞 Phone<strong>${phone||'—'}</strong></div>
        <div class="detail-item">📍 Address<strong>${(j.customer_address||'—').substring(0,40)}</strong></div>
        <div class="detail-item">⚡ Urgency<strong style="text-transform:capitalize">${j.urgency||'normal'}</strong></div>
        <div class="detail-item">👷 Worker ID<strong>${j.worker_id||'Not assigned'}</strong></div>
        <div class="detail-item">🔢 Job ID<strong>#${j.id}</strong></div>
      </div>
      ${j.problem ? `<div class="jc-problem">"${j.problem}"</div>` : ''}
      <div class="jc-actions">
        ${canComplete ? `<button class="btn-complete" onclick="markComplete(${j.id})">✅ Mark Complete</button>` : ''}
        ${phone ? `<button class="btn-call" onclick="window.location.href='tel:+91${phone}'">📞 Call</button>` : ''}
        <button class="btn-dismiss" onclick="dismissCard(${j.id})">Dismiss</button>
      </div>
      <div class="jc-footer">
        <div class="jc-date">📅 ${date}</div>
        <div class="jc-amount">₹${j.amount||0}</div>
      </div>
    </div>`;
  }

  async function markComplete(id) {
    try {
      await db.from('jobs').update({ status:'completed', completed_at:new Date().toISOString() }).eq('id', id);
      allJobs = allJobs.map(j => j.id === id ? {...j, status:'completed'} : j);
      updateCounts();
      renderTab(currentTab);
      showToast('✅ Job #' + id + ' marked complete');
    } catch (e) { showToast('⚠️ Error: ' + e.message); }
  }

  function dismissCard(id) {
    const el = document.getElementById('jcard-'+id);
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }
  }

  function adminLogout() {
    if (confirm('Logout?')) {
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminLoginTime');
      window.location.href = 'login.html';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  loadJobs();
  setInterval(loadJobs, 20000);
</script>
</body>
</html>
