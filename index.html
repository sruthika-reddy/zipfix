<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>ZipFix</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    body { background:#0f0f0f; color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { text-align:center; padding:40px; }
    .logo { font-size:48px; font-weight:900; color:#00d4ff; letter-spacing:5px; margin-bottom:10px; }
    .tagline { font-size:16px; color:#aaaaaa; margin-bottom:50px; }
    .buttons { display:flex; flex-direction:column; gap:15px; max-width:300px; margin:0 auto; }
    .btn { padding:18px; border-radius:15px; font-size:16px; font-weight:800; cursor:pointer; border:none; text-decoration:none; display:block; text-align:center; }
    .btn-customer { background:#00d4ff; color:#0f0f0f; }
    .btn-worker   { background:#ff8c00; color:#0f0f0f; }
    .btn-admin    { background:#ff3b3b; color:white; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">ZIPFIX</div>
    <div class="tagline">Emergency help in minutes</div>
    <div class="buttons">
      <a class="btn btn-customer" href="customer/index.html">👤 Customer App</a>
      <a class="btn btn-worker"   href="worker/index.html">👷 Worker App</a>
      <a class="btn btn-admin"    href="admin/login.html">⚡ Admin Panel</a>
    </div>
  </div>
</body>
</html>
