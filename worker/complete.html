<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ZipFix Partner — Job Complete</title></head>
<body>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .box{width:100%;max-width:420px;text-align:center;}
  .success-circle{width:110px;height:110px;background:linear-gradient(135deg,#e8f8f4,#00b894);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;margin:0 auto 22px;animation:pop 0.5s ease;}
  @keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  h1{font-size:30px;font-weight:900;color:#00b894;margin-bottom:8px;}
  .subtitle{font-size:14px;color:#888;margin-bottom:28px;line-height:1.6;}
  .earned-card{background:#fff;border-radius:22px;padding:26px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .earned-card .lbl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .earned-amt{font-size:48px;font-weight:900;color:#00b894;margin-bottom:4px;}
  .earned-note{font-size:12px;color:#aaa;}
  .stats-row{display:flex;justify-content:space-around;background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .stat h4{font-size:20px;font-weight:900;color:#00b894;}
  .stat p{font-size:11px;color:#888;margin-top:4px;}
  .rating-card{background:#fff;border-radius:18px;padding:16px 18px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .rating-card h4{font-size:14px;font-weight:800;}
  .rating-card p{font-size:12px;color:#888;margin-top:3px;}
  .rating-stars{font-size:22px;}
  .btn-main{width:100%;padding:18px;background:#00b894;color:#fff;font-size:17px;font-weight:900;border:none;border-radius:14px;cursor:pointer;margin-bottom:10px;transition:background 0.2s;}
  .btn-main:hover{background:#009e7f;}
  .btn-secondary{width:100%;padding:15px;background:#fff;color:#888;font-size:15px;font-weight:700;border:2px solid #e0e0e0;border-radius:14px;cursor:pointer;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div class="box">
  <div class="success-circle">✅</div>
  <h1>Job Done! 🎉</h1>
  <p class="subtitle">Great work! Payment is being<br/>processed and will reflect shortly.</p>
  <div class="earned-card">
    <div class="lbl">You Earned</div>
    <div class="earned-amt" id="earnedAmt">₹—</div>
    <div class="earned-note">Payment processing · Usually instant</div>
  </div>
  <div class="stats-row">
    <div class="stat"><h4 id="todayJobs">—</h4><p>Jobs Today</p></div>
    <div class="stat"><h4 id="todayTotal">₹—</h4><p>Earned Today</p></div>
    <div class="stat"><h4 id="finalRating">—</h4><p>Your Rating</p></div>
  </div>
  <div class="rating-card">
    <div><h4>Customer Rating</h4><p id="ratingText">Waiting for customer...</p></div>
    <div class="rating-stars" id="ratingStars">⏳</div>
  </div>
  <button class="btn-main" onclick="goHome()">🏠 Back to Dashboard</button>
  <button class="btn-secondary" onclick="window.location.href='earnings.html'">💰 View Earnings</button>
</div>
<script>
  const db=supabase.createClient('https://wenvdgvyuhqdiktetvfj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4');
  if(!localStorage.getItem('workerName')||!localStorage.getItem('workerId'))window.location.href='login.html';
  const workerId=localStorage.getItem('workerId')||'';
  const lastAmt=localStorage.getItem('lastJobAmount')||0;
  const lastRating=localStorage.getItem('lastRating');
  document.getElementById('earnedAmt').innerText='₹'+lastAmt;
  if(lastRating){
    document.getElementById('ratingStars').innerText='⭐'.repeat(parseInt(lastRating));
    const lbl={1:'Poor',2:'Fair',3:'Good',4:'Great!',5:'Excellent!'};
    document.getElementById('ratingText').innerText='Rated: '+(lbl[lastRating]||lastRating);
  }
  async function loadToday(){
    try{
      const today=new Date().toISOString().split('T')[0];
      const{data}=await db.from('jobs').select('amount').eq('worker_id',workerId).eq('status','completed').gte('created_at',today);
      if(data){document.getElementById('todayJobs').innerText=data.length;document.getElementById('todayTotal').innerText='₹'+data.reduce((s,j)=>s+(j.amount||0),0);}
      const{data:w}=await db.from('workers').select('rating').eq('worker_id',workerId).single();
      if(w&&w.rating)document.getElementById('finalRating').innerText=w.rating+'⭐';
    }catch(e){}
  }
  loadToday();
  function goHome(){
    ['activeJobId','bookingService','bookingProblem','bookingAddress','bookingUrgency','bookingAmount','customerName','customerPhone','lastJobAmount','lastRating'].forEach(k=>localStorage.removeItem(k));
    window.location.href='dashboard.html';
  }
</script>
</body></html>
