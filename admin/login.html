<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Admin — Login</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0d0d0d; color:#f0f0f0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-box { background-color:#111; border:1px solid #222; border-radius:30px; padding:50px 40px; width:100%; max-width:420px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  .logo { font-size:28px; font-weight:900; color:#00b894; letter-spacing:3px; margin-bottom:8px; }
  .admin-badge { display:inline-flex; align-items:center; gap:8px; background-color:#e8f8f4; border:1px solid #00b89444; border-radius:50px; padding:8px 18px; margin-bottom:35px; font-size:13px; font-weight:700; color:#00b894; }
  h2 { font-size:24px; font-weight:800; margin-bottom:8px; color:#f0f0f0; }
  .subtitle { font-size:14px; color:#888; margin-bottom:30px; }
  .input-group { margin-bottom:16px; text-align:left; }
  .input-group label { display:block; font-size:12px; font-weight:700; color:#888; margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
  .input-group input { width:100%; padding:15px 20px; background-color:#1a1a1a; border:2px solid #222; border-radius:15px; color:#fff; font-size:16px; outline:none; transition:border-color 0.2s; }
  .input-group input:focus { border-color:#00b894; }
  .input-group input.err { border-color:#e74c3c; }
  .btn-main { width:100%; padding:18px; background-color:#00b894; color:#fff; font-size:18px; font-weight:800; border:none; border-radius:15px; cursor:pointer; margin-top:10px; transition:background-color 0.2s; }
  .btn-main:hover { background-color:#009e7f; }
  .btn-main:disabled { background-color:#444; color:#aaa; cursor:not-allowed; }
  .error-msg { background-color:#fff0ee; border:1px solid #e74c3c55; color:#e74c3c; border-radius:12px; padding:14px 16px; font-size:14px; margin-top:15px; display:none; }
  .lockout-msg { background-color:#fff8e6; border:1px solid #f39c1255; color:#e67e00; border-radius:12px; padding:14px 16px; font-size:14px; margin-top:15px; display:none; }
  .attempts-note { font-size:12px; color:#aaa; margin-top:12px; }
  .security-note { font-size:12px; color:#444; margin-top:20px; }
</style>

<div class="login-box">
  <div class="logo">ZIPFIX</div>
  <div class="admin-badge">🔐 Admin Portal</div>
  <h2>Admin Login</h2>
  <p class="subtitle">Restricted access — authorised personnel only</p>

  <div class="input-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter admin username" oninput="clearErr()" autocomplete="off" />
  </div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" oninput="clearErr()" />
  </div>

  <button class="btn-main" id="loginBtn" onclick="doLogin()">🔐 Login to Admin Panel</button>
  <div class="error-msg"   id="errorMsg"></div>
  <div class="lockout-msg" id="lockoutMsg"></div>
  <div class="attempts-note" id="attemptsNote"></div>
  <div class="security-note">🔒 Not linked or indexed publicly</div>
</div>

<script>
  const ADMIN_USER   = 'zipfix_admin';
  const ADMIN_PASS   = 'ZipFix@2026#Admin';
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MS   = 5 * 60 * 1000;
  const SESSION_MS   = 8 * 60 * 60 * 1000;

  if (localStorage.getItem('adminLoggedIn') && (Date.now() - parseInt(localStorage.getItem('adminLoginTime')||0) < SESSION_MS)) {
    window.location.href = 'index.html';
  }

  checkLockout();

  function checkLockout() {
    const until = parseInt(localStorage.getItem('adminLockoutUntil') || '0');
    if (Date.now() < until) {
      const mins = Math.ceil((until - Date.now()) / 60000);
      document.getElementById('lockoutMsg').innerText = '🔒 Too many failed attempts. Try again in ' + mins + ' min.';
      document.getElementById('lockoutMsg').style.display = 'block';
      document.getElementById('loginBtn').disabled = true;
      setTimeout(checkLockout, 10000);
    } else {
      document.getElementById('lockoutMsg').style.display = 'none';
      document.getElementById('loginBtn').disabled = false;
    }
  }

  function clearErr() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('attemptsNote').innerText = '';
    document.getElementById('username').classList.remove('err');
    document.getElementById('password').classList.remove('err');
  }

  function doLogin() {
    const until = parseInt(localStorage.getItem('adminLockoutUntil') || '0');
    if (Date.now() < until) { checkLockout(); return; }
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u) { document.getElementById('username').classList.add('err'); return; }
    if (!p) { document.getElementById('password').classList.add('err'); return; }
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      localStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminLoginTime', Date.now());
      localStorage.removeItem('adminFailedAttempts');
      localStorage.removeItem('adminLockoutUntil');
      window.location.href = 'index.html';
    } else {
      let fails = parseInt(localStorage.getItem('adminFailedAttempts') || '0') + 1;
      localStorage.setItem('adminFailedAttempts', fails);
      if (fails >= MAX_ATTEMPTS) {
        localStorage.setItem('adminLockoutUntil', Date.now() + LOCKOUT_MS);
        localStorage.setItem('adminFailedAttempts', '0');
        checkLockout();
      } else {
        document.getElementById('errorMsg').innerText = '❌ Invalid username or password.';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('attemptsNote').innerText = (MAX_ATTEMPTS - fails) + ' attempt(s) left before 5-min lockout.';
        document.getElementById('username').classList.add('err');
        document.getElementById('password').classList.add('err');
        document.getElementById('password').value = '';
      }
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
