<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ZipFix Admin — Login</title>
</head>
<body>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .box{background:#fff;border-radius:28px;padding:44px 32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center;}
  .logo{font-size:30px;font-weight:900;color:#00b894;letter-spacing:3px;margin-bottom:6px;}
  .admin-badge{display:inline-flex;align-items:center;gap:6px;background:#e8f8f4;border:1px solid #00b89433;border-radius:50px;padding:6px 16px;font-size:12px;font-weight:800;color:#00b894;margin-bottom:28px;}
  h2{font-size:21px;font-weight:900;margin-bottom:6px;color:#1a1a1a;}
  .sub{font-size:13px;color:#888;margin-bottom:28px;}
  .field{margin-bottom:16px;text-align:left;}
  .field label{display:block;font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .field input{width:100%;padding:14px 16px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:14px;font-size:15px;color:#1a1a1a;outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:#00b894;background:#fff;}
  .field input.err{border-color:#e74c3c;}
  .error-box{background:#fff0ee;border:1px solid #e74c3c22;color:#e74c3c;border-radius:12px;padding:13px 16px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;text-align:left;}
  .lock-box{background:#fff8e6;border:1px solid #f0c04022;color:#e67e00;border-radius:12px;padding:13px 16px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;text-align:left;}
  .btn{width:100%;padding:16px;background:#00b894;color:#fff;font-size:16px;font-weight:900;border:none;border-radius:14px;cursor:pointer;margin-top:4px;transition:background 0.2s;}
  .btn:hover{background:#009e7f;}
  .btn:disabled{background:#ccc;cursor:not-allowed;}
  .attempts-note{font-size:12px;color:#aaa;margin-top:14px;display:none;}
  .attempts-note b{color:#e74c3c;}
</style>

<div class="box">
  <div class="logo">ZIPFIX</div>
  <div class="admin-badge">🔐 Admin Panel</div>
  <h2>Admin Login</h2>
  <p class="sub">Restricted — authorised team only</p>

  <div class="error-box" id="errBox"></div>
  <div class="lock-box" id="lockBox"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="uname" placeholder="Admin username" autocomplete="username" oninput="ce()"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="upass" placeholder="Admin password" autocomplete="current-password" oninput="ce()"/>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Login →</button>
  <div class="attempts-note" id="attNote">Failed attempts: <b id="attCount">0</b> / 5</div>
</div>

<script>
  if(localStorage.getItem('adminLoggedIn')) window.location.href='index.html';

  const U='zipfix_admin', P='ZipFix@2026#Admin';
  const LOCK_MS=30*60*1000, SESS_MS=8*60*60*1000;

  function ce(){
    document.getElementById('errBox').style.display='none';
    document.getElementById('uname').classList.remove('err');
    document.getElementById('upass').classList.remove('err');
  }

  function doLogin(){
    const lockUntil=parseInt(localStorage.getItem('adminLockUntil')||'0');
    if(lockUntil && Date.now()<lockUntil){
      const min=Math.ceil((lockUntil-Date.now())/60000);
      document.getElementById('lockBox').innerText='🔒 Locked. Try again in '+min+' min.';
      document.getElementById('lockBox').style.display='block';
      return;
    }

    const u=document.getElementById('uname').value.trim();
    const p=document.getElementById('upass').value;
    if(!u){document.getElementById('uname').classList.add('err');}
    if(!p){document.getElementById('upass').classList.add('err');}
    if(!u||!p){document.getElementById('errBox').innerText='❌ Please enter username and password';document.getElementById('errBox').style.display='block';return;}

    const btn=document.getElementById('loginBtn');
    btn.disabled=true;btn.innerText='Verifying...';

    setTimeout(()=>{
      if(u===U && p===P){
        localStorage.removeItem('adminFailAttempts');
        localStorage.removeItem('adminLockUntil');
        localStorage.setItem('adminLoggedIn','true');
        localStorage.setItem('adminLoginTime',Date.now().toString());
        window.location.href='index.html';
      } else {
        btn.disabled=false;btn.innerText='Login →';
        let att=parseInt(localStorage.getItem('adminFailAttempts')||'0')+1;
        localStorage.setItem('adminFailAttempts',att);
        document.getElementById('uname').classList.add('err');
        document.getElementById('upass').classList.add('err');
        if(att>=5){
          localStorage.setItem('adminLockUntil',Date.now()+LOCK_MS);
          localStorage.removeItem('adminFailAttempts');
          document.getElementById('lockBox').innerText='🔒 Too many failed attempts. Locked for 30 minutes.';
          document.getElementById('lockBox').style.display='block';
          document.getElementById('errBox').style.display='none';
          document.getElementById('attNote').style.display='none';
        } else {
          document.getElementById('errBox').innerText='❌ Incorrect username or password';
          document.getElementById('errBox').style.display='block';
          if(att>=2){document.getElementById('attNote').style.display='block';document.getElementById('attCount').innerText=att;}
        }
      }
    },600);
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
