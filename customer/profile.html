<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Profile</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0d0d0d; color:#f0f0f0; min-height:100vh; }

  .navbar { display:flex; justify-content:space-between; align-items:center; padding:20px 30px; background-color:#111; border-bottom:1px solid #222; }
  .logo { font-size:22px; font-weight:900; color:#00b894; letter-spacing:2px; }
  .back-btn { background:none; border:none; color:#00b894; font-size:22px; cursor:pointer; }

  .avatar-section { display:flex; flex-direction:column; align-items:center; padding:40px 30px 30px; gap:12px; }
  .avatar-circle { width:90px; height:90px; background-color:#00b894; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:38px; font-weight:900; color:#fff; }
  .avatar-name { font-size:22px; font-weight:900; color:#f0f0f0; }
  .avatar-area { font-size:14px; color:#888; }

  .info-section { padding:0 25px; display:flex; flex-direction:column; gap:12px; }
  .info-card { background-color:#111; border:1px solid #222; border-radius:18px; padding:18px 20px; display:flex; align-items:center; gap:15px; }
  .info-icon { font-size:22px; width:36px; text-align:center; }
  .info-label { font-size:12px; color:#888; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .info-value { font-size:16px; font-weight:700; color:#f0f0f0; }

  .section-title { padding:22px 25px 10px; font-size:13px; font-weight:800; color:#888; text-transform:uppercase; letter-spacing:1px; }

  .support-card { background-color:#111; border:1px solid #222; border-radius:18px; padding:18px 20px; display:flex; align-items:center; gap:15px; margin:0 25px 12px; text-decoration:none; color:#f0f0f0; cursor:pointer; }
  .support-card:hover { border-color:#00b894; }
  .coming-soon { font-size:11px; color:#bbb; margin-top:3px; }

  .logout-btn { margin:20px 25px 0; width:calc(100% - 50px); padding:18px; background-color:#e74c3c; color:#fff; font-size:16px; font-weight:800; border:none; border-radius:15px; cursor:pointer; transition:background-color 0.2s; }
  .logout-btn:hover { background-color:#c0392b; }

  .spacer { height:100px; }

  .bottom-nav { position:fixed; bottom:0; width:100%; background-color:#111; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #222; z-index:100; }
  .nav-item { display:flex; flex-direction:column; align-items:center; cursor:pointer; font-size:11px; color:#aaa; gap:4px; }
  .nav-item.active { color:#00b894; }
  .nav-item .nav-icon { font-size:22px; }
</style>

<nav class="navbar">
  <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
  <div class="logo">ZIPFIX</div>
  <div style="width:40px"></div>
</nav>

<div class="avatar-section">
  <div class="avatar-circle" id="avatarInitial">?</div>
  <div class="avatar-name"   id="avatarName">—</div>
  <div class="avatar-area"   id="avatarArea">📍 —</div>
</div>

<div class="info-section">
  <div class="info-card">
    <div class="info-icon">👤</div>
    <div><div class="info-label">Full Name</div><div class="info-value" id="infoName">—</div></div>
  </div>
  <div class="info-card">
    <div class="info-icon">📱</div>
    <div><div class="info-label">Phone Number</div><div class="info-value" id="infoPhone">—</div></div>
  </div>
  <div class="info-card">
    <div class="info-icon">✉️</div>
    <div><div class="info-label">Email Address</div><div class="info-value" id="infoEmail">—</div></div>
  </div>
  <div class="info-card">
    <div class="info-icon">📍</div>
    <div><div class="info-label">Area</div><div class="info-value" id="infoArea">—</div></div>
  </div>
</div>

<div class="section-title">Customer Support</div>

<a class="support-card" href="/cdn-cgi/l/email-protection#9feceaefeff0edebdfe5f6eff9f6e7b1fcf0f2">

</a>
<div class="support-card" onclick="alert('📞 Coming soon!')">
  <div class="info-icon">📞</div>
  <div><div class="info-label">Call Us</div><div class="info-value">—</div><div class="coming-soon">Helpline number coming soon</div></div>
</div>

<button class="logout-btn" onclick="logoutUser()">🚪 Logout</button>

<div class="spacer"></div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div><div>Home</div></div>
  <div class="nav-item" onclick="window.location.href='bookings.html'"><div class="nav-icon">📋</div><div>Bookings</div></div>
  <div class="nav-item" onclick="window.location.href='track.html'"><div class="nav-icon">📍</div><div>Track</div></div>
  <div class="nav-item active"><div class="nav-icon">👤</div><div>Profile</div></div>
</nav>
