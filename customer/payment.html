<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Payment</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#0d0d0d; color:#f0f0f0; min-height:100vh; }

  .navbar { display:flex; align-items:center; padding:20px 25px; background-color:#111; border-bottom:1px solid #222; gap:15px; }
  .back-btn { font-size:22px; cursor:pointer; color:#00b894; }
  .navbar h3 { font-size:20px; font-weight:800; }

  .content { padding:22px 25px 40px; }

  /* Job summary */
  .summary-card { background-color:#111; border:1px solid #222; border-radius:20px; padding:22px; margin-bottom:20px; }
  .summary-card h4 { font-size:12px; color:#555; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; font-weight:800; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid #1a1a1a; font-size:14px; }
  .summary-row:last-child { border-bottom:none; padding-top:14px; margin-top:4px; }
  .summary-row .s-label { color:#555; }
  .summary-row .s-value { font-weight:700; }
  .summary-row.total { font-size:18px; }
  .summary-row.total .s-value { color:#00b894; font-size:22px; font-weight:900; }

  /* Payment methods */
  .methods-title { font-size:12px; color:#555; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; font-weight:800; }
  .method-card { background-color:#111; border:2px solid #222; border-radius:16px; padding:16px 18px; margin-bottom:10px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all 0.2s; }
  .method-card.selected { border-color:#00b894; background-color:#0d2b24; }
  .method-icon { font-size:26px; width:36px; text-align:center; }
  .method-info h5 { font-size:15px; font-weight:800; }
  .method-info p  { font-size:12px; color:#555; margin-top:3px; }
  .method-check { margin-left:auto; width:22px; height:22px; border-radius:50%; border:2px solid #333; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; transition:all 0.2s; }
  .method-card.selected .method-check { background-color:#00b894; border-color:#00b894; }

  .btn-pay { width:100%; padding:20px; background-color:#00b894; color:#fff; font-size:19px; font-weight:900; border:none; border-radius:15px; cursor:pointer; margin-top:22px; transition:background-color 0.2s; }
  .btn-pay:hover { background-color:#009e7f; }
  .btn-pay:disabled { background-color:#1a3a30; color:#333; cursor:not-allowed; }
  .secure-note { text-align:center; font-size:12px; color:#333; margin-top:14px; }
  .secure-note span { color:#00b894; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<nav class="navbar">
  <div class="back-btn" onclick="window.location.href='track.html'">←</div>
  <h3>Payment 💳</h3>
</nav>

<div class="content">
  <div class="summary-card">
    <h4>Job Summary</h4>
    <div class="summary-row"><span class="s-label">Service</span><span class="s-value" id="sumService">—</span></div>
    <div class="summary-row"><span class="s-label">Worker</span><span class="s-value" id="sumWorker">—</span></div>
    <div class="summary-row"><span class="s-label">Job ID</span><span class="s-value" id="sumJobId" style="color:#555">—</span></div>
    <div class="summary-row"><span class="s-label">Service Fee</span><span class="s-value" id="sumFee">—</span></div>
    <div class="summary-row total"><span class="s-label">Total</span><span class="s-value" id="sumTotal">—</span></div>
  </div>

  <div class="methods-title">Select Payment Method</div>

  <div class="method-card selected" id="m-upi" onclick="selectMethod('upi')">
    <div class="method-icon">📱</div>
    <div class="method-info"><h5>UPI</h5><p>GPay, PhonePe, Paytm</p></div>
    <div class="method-check">✓</div>
  </div>
  <div class="method-card" id="m-card" onclick="selectMethod('card')">
    <div class="method-icon">💳</div>
    <div class="method-info"><h5>Credit / Debit Card</h5><p>Visa, Mastercard, RuPay</p></div>
    <div class="method-check"></div>
  </div>
  <div class="method-card" id="m-cash" onclick="selectMethod('cash')">
    <div class="method-icon">💵</div>
    <div class="method-info"><h5>Cash on Completion</h5><p>Pay worker directly after job</p></div>
    <div class="method-check"></div>
  </div>

  <button class="btn-pay" id="payBtn" onclick="makePayment()">Pay Now</button>
  <div class="secure-note"><span>🔒 100% Secure</span> · Powered by Razorpay</div>
</div>

<script>
  if (!localStorage.getItem('phoneNumber')) { window.location.href = 'login.html'; }
  if (localStorage.getItem('adminLoggedIn')) { window.location.href = '../admin/index.html'; }

  const db = supabase.createClient(
    'https://wenvdgvyuhqdiktetvfj.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4'
  );

  let selectedMethod = 'upi', currentJob = null;

  async function loadJobData() {
    const jobId    = localStorage.getItem('activeJobId');
    const myPhone  = '+91' + localStorage.getItem('phoneNumber');
    const icons    = { Plumber:'🔧', Electrician:'⚡', Locksmith:'🔑', 'AC Repair':'❄️', Carpenter:'🪛', Painter:'🖌️', 'Pest Control':'🐛', 'Home Cleaning':'🧹', 'TV / Electronics Repair':'📺', 'Water Purifier Service':'🫧', 'Appliance Repair':'🔩', 'Bathroom Renovation':'🛁', 'Packers & Movers':'📦', 'CCTV Installation':'🔒' };

    try {
      let job = null;
      if (jobId) {
        const { data } = await db.from('jobs').select('*').eq('id', jobId).single();
        job = data;
      }
      if (!job) {
        const { data } = await db.from('jobs').select('*').eq('customer_phone', myPhone).in('status',['completed','accepted','in_progress']).order('created_at',{ascending:false}).limit(1);
        if (data && data.length) job = data[0];
      }

      if (job) {
        currentJob = job;
        const ico     = icons[job.service] || '🔧';
        const amount  = job.amount || 0;
        const workerN = localStorage.getItem('workerName') || 'Your Worker';

        document.getElementById('sumService').innerText = ico + ' ' + (job.service||'—');
        document.getElementById('sumWorker').innerText  = workerN;
        document.getElementById('sumJobId').innerText   = '#' + job.id;
        document.getElementById('sumFee').innerText     = '₹' + amount;
        document.getElementById('sumTotal').innerText   = '₹' + amount;
        localStorage.setItem('amountPaid', amount);
      } else {
        // Fallback to localStorage
        const service = localStorage.getItem('bookingService') || '—';
        const amount  = localStorage.getItem('bookingAmount')  || '—';
        const worker  = localStorage.getItem('workerName')     || '—';
        document.getElementById('sumService').innerText = service;
        document.getElementById('sumWorker').innerText  = worker;
        document.getElementById('sumFee').innerText     = '₹' + amount;
        document.getElementById('sumTotal').innerText   = '₹' + amount;
      }
    } catch(e) {
      // Fallback silently
      const service = localStorage.getItem('bookingService') || '—';
      const amount  = localStorage.getItem('bookingAmount')  || '—';
      document.getElementById('sumService').innerText = service;
      document.getElementById('sumFee').innerText     = '₹' + amount;
      document.getElementById('sumTotal').innerText   = '₹' + amount;
    }
  }

  function selectMethod(method) {
    selectedMethod = method;
    document.querySelectorAll('.method-card').forEach(c => {
      c.classList.remove('selected');
      c.querySelector('.method-check').innerText = '';
    });
    const el = document.getElementById('m-' + method);
    el.classList.add('selected');
    el.querySelector('.method-check').innerText = '✓';
  }

  async function makePayment() {
    const btn    = document.getElementById('payBtn');
    const amount = document.getElementById('sumTotal').innerText;
    btn.disabled = true;

    if (selectedMethod === 'cash') {
      localStorage.setItem('paymentMethod', 'Cash');
      localStorage.setItem('paymentStatus', 'pending_cash');
      // Update job status in Supabase
      if (currentJob) {
        try { await db.from('jobs').update({ status:'completed', completed_at:new Date().toISOString() }).eq('id', currentJob.id); } catch(e) {}
      }
      alert('💵 Cash selected!\nPay ' + amount + ' directly to the worker.');
      window.location.href = 'rate.html';
      return;
    }

    // UPI / Card — mark as paid
    localStorage.setItem('paymentMethod', selectedMethod === 'upi' ? 'UPI' : 'Card');
    localStorage.setItem('paymentStatus', 'paid');

    if (currentJob) {
      try { await db.from('jobs').update({ status:'completed', completed_at:new Date().toISOString() }).eq('id', currentJob.id); } catch(e) {}
    }

    // Simulate Razorpay (replace with real integration later)
    alert('✅ Payment of ' + amount + ' successful!\nThank you for using ZipFix 🎉');
    localStorage.removeItem('activeJobId');
    window.location.href = 'rate.html';
  }

  loadJobData();
</script>
</body>
</html>
