<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ZipFix — Track Worker</title>
</head>
<body>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#f5f5f5;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}
  .navbar{display:flex;align-items:center;padding:16px 20px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.06);gap:14px;z-index:10;}
  .back-btn{font-size:22px;color:#00b894;cursor:pointer;}
  .navbar h3{font-size:17px;font-weight:800;}
  .nav-status{margin-left:auto;padding:6px 14px;border-radius:50px;font-size:12px;font-weight:800;}
  .ns-live{background:#e8f8f4;color:#00b894;}
  .ns-waiting{background:#fff8e6;color:#e67e00;}
  .map-container{flex:1;position:relative;background:#e8f4e8;min-height:300px;overflow:hidden;border-bottom:1px solid #e0e0e0;}
  .map-grid{position:absolute;width:100%;height:100%;background-image:linear-gradient(rgba(0,184,148,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,184,148,0.06) 1px,transparent 1px);background-size:40px 40px;}
  .map-road-h{position:absolute;height:6px;background:rgba(255,255,255,0.7);width:100%;}
  .map-road-v{position:absolute;width:6px;background:rgba(255,255,255,0.7);height:100%;}
  .eta-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #00b894;border-radius:50px;padding:9px 20px;font-size:13px;font-weight:800;color:#00b894;z-index:10;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  .customer-pin{position:absolute;bottom:28%;left:50%;transform:translateX(-50%);text-align:center;z-index:5;}
  .customer-pin .pin-icon{font-size:30px;}
  .customer-pin .pin-label{background:#00b894;color:#fff;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;margin-top:2px;}
  .worker-pin{position:absolute;text-align:center;z-index:5;transition:all 1.5s ease;}
  .worker-pin .pin-icon{font-size:30px;}
  .worker-pin .pin-label{background:#e67e00;color:#fff;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;margin-top:2px;}
  .no-job-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;}
  .no-job-state .icon{font-size:44px;margin-bottom:10px;}
  .bottom-sheet{background:#fff;border-radius:26px 26px 0 0;border-top:1px solid #e0e0e0;padding:22px 20px 34px;}
  .worker-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .worker-avatar{width:50px;height:50px;background:#00b894;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#fff;flex-shrink:0;}
  .worker-info h4{font-size:16px;font-weight:800;}
  .worker-info p{font-size:12px;color:#888;margin-top:3px;}
  .action-row{display:flex;gap:10px;margin-bottom:16px;}
  .action-btn{flex:1;padding:13px 8px;border-radius:13px;border:none;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s;}
  .btn-call{background:#e8f8f4;color:#00b894;}
  .btn-call:hover{background:#00b894;color:#fff;}
  .btn-sos{background:#fff0ee;color:#e74c3c;}
  .btn-sos:hover{background:#e74c3c;color:#fff;}
  .btn-done{background:#e8f8f4;color:#00b894;}
  .btn-done:hover{background:#00b894;color:#fff;}
  .progress-track{background:#f0f0f0;border-radius:10px;height:6px;overflow:hidden;}
  .progress-fill{height:100%;background:#00b894;border-radius:10px;transition:width 1s ease;}
  .progress-text{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:6px;}
  .job-details{background:#f5f5f5;border-radius:14px;padding:14px 16px;margin-top:14px;}
  .jd-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;}
  .jd-row .jd-label{color:#888;}
  .jd-row .jd-val{font-weight:700;}
  .btn-payment{width:100%;padding:15px;background:#00b894;color:#fff;font-size:15px;font-weight:800;border:none;border-radius:14px;cursor:pointer;margin-top:16px;display:none;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<nav class="navbar">
  <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
  <h3 id="navTitle">Track Worker</h3>
  <div class="nav-status ns-waiting" id="navStatus">⏳ Waiting</div>
</nav>
<div class="map-container" id="mapContainer">
  <div class="map-grid"></div>
  <div class="map-road-h" style="top:30%"></div><div class="map-road-h" style="top:55%"></div><div class="map-road-h" style="top:75%"></div>
  <div class="map-road-v" style="left:25%"></div><div class="map-road-v" style="left:60%"></div><div class="map-road-v" style="left:80%"></div>
  <div class="eta-badge" id="etaBadge">⏳ Waiting for worker...</div>
  <div class="customer-pin"><div class="pin-icon">🏠</div><div class="pin-label">You</div></div>
  <div class="worker-pin" id="workerPin" style="top:15%;left:18%;display:none"><div class="pin-icon">👷</div><div class="pin-label" id="workerPinLabel">Worker</div></div>
  <div class="no-job-state" id="noJobState" style="display:none"><div class="icon">📋</div><p>No active booking</p></div>
</div>
<div class="bottom-sheet">
  <div class="worker-row">
    <div class="worker-avatar" id="workerAvatar">?</div>
    <div class="worker-info"><h4 id="workerName">Loading...</h4><p id="workerSubtitle">Fetching job details...</p></div>
  </div>
  <div class="action-row">
    <button class="action-btn btn-call" id="callBtn" onclick="callWorker()">📞 Call</button>
    <button class="action-btn btn-done" id="doneBtn" onclick="markArrived()" style="display:none">✅ Done</button>
    <button class="action-btn btn-sos" onclick="window.location.href='tel:112'">🚨 SOS</button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  <div class="progress-text"><span id="progressLabel">Waiting for worker</span><span id="progressPct">10%</span></div>
  <div class="job-details" id="jobDetails" style="display:none">
    <div class="jd-row"><span class="jd-label">Service</span><span class="jd-val" id="jdService">—</span></div>
    <div class="jd-row"><span class="jd-label">Address</span><span class="jd-val" id="jdAddress" style="max-width:170px;text-align:right;font-size:11px">—</span></div>
    <div class="jd-row"><span class="jd-label">Amount</span><span class="jd-val" id="jdAmount" style="color:#00b894">—</span></div>
    <div class="jd-row"><span class="jd-label">Job ID</span><span class="jd-val" id="jdId" style="color:#aaa">—</span></div>
  </div>
  <button class="btn-payment" id="paymentBtn" onclick="window.location.href='payment.html'">💳 Proceed to Payment</button>
</div>
<script>
  if(!localStorage.getItem('phoneNumber')){window.location.href='login.html';}
  const db=supabase.createClient('https://wenvdgvyuhqdiktetvfj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4');
  const icons={Plumber:'🔧',Electrician:'⚡',Locksmith:'🔑','AC Repair':'❄️',Carpenter:'🪛',Painter:'🖌️','Pest Control':'🐛','Home Cleaning':'🧹','TV / Electronics Repair':'📺','Water Purifier Service':'🫧','Appliance Repair':'🔩','Bathroom Renovation':'🛁','Packers & Movers':'📦','CCTV Installation':'🔒'};
  let currentJob=null,animFrame=0;
  const positions=[{top:'15%',left:'18%'},{top:'22%',left:'28%'},{top:'30%',left:'36%'},{top:'35%',left:'44%'},{top:'42%',left:'50%'},{top:'50%',left:'52%'}];

  async function loadJob(){
    const myPhone='+91'+localStorage.getItem('phoneNumber');
    try{
      const savedJobId=localStorage.getItem('activeJobId');
      let job=null;
      if(savedJobId){const{data}=await db.from('jobs').select('*').eq('id',savedJobId).single();if(data&&['pending','accepted','in_progress','completed'].includes(data.status))job=data;}
      if(!job){const{data}=await db.from('jobs').select('*').eq('customer_phone',myPhone).in('status',['pending','accepted','in_progress']).order('created_at',{ascending:false}).limit(1);if(data&&data.length>0)job=data[0];}
      if(!job){
        document.getElementById('noJobState').style.display='flex';
        document.getElementById('workerPin').style.display='none';
        document.getElementById('navTitle').innerText='No Active Job';
        document.getElementById('workerName').innerText='No active booking';
        document.getElementById('workerSubtitle').innerText='Book a service to get started';
        document.getElementById('etaBadge').innerText='📋 No active job';
        document.getElementById('progressFill').style.width='0%';
        return;
      }
      currentJob=job;localStorage.setItem('activeJobId',job.id);showJob(job);
      if(job.worker_id){
        const{data:w}=await db.from('workers').select('name,phone,skill,area').eq('worker_id',job.worker_id).single();
        if(w){
          const name=w.name||'Your Worker',initial=name.charAt(0).toUpperCase();
          document.getElementById('workerName').innerText=name;document.getElementById('workerAvatar').innerText=initial;
          document.getElementById('workerSubtitle').innerText='🔧 '+(w.skill||'—')+' · 📍 '+(w.area||'—');
          document.getElementById('workerPinLabel').innerText=name.split(' ')[0];
          document.getElementById('workerPin').style.display='block';
          localStorage.setItem('workerName',name);localStorage.setItem('workerInitial',initial);localStorage.setItem('workerPhone',w.phone||'');
          animateWorker();
        }
      }
    }catch(e){document.getElementById('workerSubtitle').innerText='⚠️ '+e.message;}
  }

  function showJob(job){
    const ico=icons[job.service]||'🔧';
    const sLabels={pending:'⏳ Pending',accepted:'🔵 On the way',in_progress:'🟢 In Progress'};
    document.getElementById('navStatus').innerText=sLabels[job.status]||job.status;
    document.getElementById('navStatus').className='nav-status '+(job.status==='pending'?'ns-waiting':'ns-live');
    document.getElementById('navTitle').innerText=job.status==='accepted'?'🚗 Worker On The Way':job.status==='in_progress'?'🔧 Work In Progress':'⏳ Finding Worker';
    document.getElementById('etaBadge').innerText=job.status==='pending'?'⏳ Finding worker...':job.status==='accepted'?'🚗 Worker is coming':'🔧 Working now';
    const pct=job.status==='pending'?15:job.status==='accepted'?55:85;
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('progressLabel').innerText=job.status==='pending'?'Finding worker':job.status==='accepted'?'Worker on the way':'Work in progress';
    document.getElementById('progressPct').innerText=pct+'%';
    document.getElementById('jobDetails').style.display='block';
    const addr=(job.customer_address||'').length>35?job.customer_address.substring(0,35)+'...':(job.customer_address||'—');
    document.getElementById('jdService').innerText=ico+' '+(job.service||'—');
    document.getElementById('jdAddress').innerText=addr;
    document.getElementById('jdAmount').innerText='₹'+(job.amount||'—');
    document.getElementById('jdId').innerText='#'+job.id;
    if(job.status==='accepted'||job.status==='in_progress')document.getElementById('doneBtn').style.display='flex';
    if(job.status==='completed'){document.getElementById('paymentBtn').style.display='block';document.getElementById('progressFill').style.width='100%';document.getElementById('progressLabel').innerText='Job completed!';document.getElementById('progressPct').innerText='100%';}
  }

  function animateWorker(){
    if(animFrame>=positions.length)return;
    const pin=document.getElementById('workerPin');
    pin.style.top=positions[animFrame].top;pin.style.left=positions[animFrame].left;
    animFrame++;setTimeout(animateWorker,4000);
  }
  function callWorker(){const p=localStorage.getItem('workerPhone')||'';if(p)window.location.href='tel:'+p;else alert('Worker phone not available yet.');}
  async function markArrived(){
    if(!currentJob)return;if(!confirm('Mark job as completed?'))return;
    try{await db.from('jobs').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',currentJob.id);}catch(e){alert('Error: '+e.message);return;}
    document.getElementById('paymentBtn').style.display='block';document.getElementById('doneBtn').style.display='none';
    document.getElementById('navStatus').innerText='✅ Done';document.getElementById('etaBadge').innerText='✅ Job Completed!';
    document.getElementById('progressFill').style.width='100%';document.getElementById('progressLabel').innerText='Job completed!';document.getElementById('progressPct').innerText='100%';
  }
  loadJob();setInterval(loadJob,8000);
</script>
</body>
</html>
