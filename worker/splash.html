<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Worker</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#111; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; }
  .logo { font-size:52px; font-weight:900; color:#00b894; letter-spacing:6px; animation:fadeIn 0.8s ease; }
  .portal-badge { display:inline-flex; align-items:center; gap:8px; background-color:#1a1a1a; border:1px solid #00b89444; border-radius:50px; padding:8px 18px; margin-top:14px; font-size:13px; font-weight:700; color:#00b894; animation:fadeIn 1.2s ease; }
  .tagline { font-size:15px; color:#aaa; margin-top:10px; letter-spacing:1px; animation:fadeIn 1.4s ease; }
  .loader { margin-top:50px; width:40px; height:4px; background:#333; border-radius:10px; overflow:hidden; animation:fadeIn 1.5s ease; }
  .loader-fill { height:100%; background:#00b894; border-radius:10px; animation:load 2s ease forwards; }
  @keyframes load { 0%{width:0%} 100%{width:100%} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
<div class="logo">ZIPFIX</div>
<div class="portal-badge">👷 Worker Portal</div>
<div class="tagline">Earn Money Near You</div>
<div class="loader"><div class="loader-fill"></div></div>
<script>
  setTimeout(function() {
    if (localStorage.getItem('adminLoggedIn')) {
      window.location.href = '../admin/index.html';
    } else if (localStorage.getItem('workerName') && localStorage.getItem('workerId')) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'landing.html';
    }
  }, 2200);
</script>
</body>
</html>
