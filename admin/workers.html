<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix Admin — Worker Management</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; }
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:18px 25px; background-color:#fffdf7; border-bottom:1px solid #ede9df; position:sticky; top:0; z-index:100; }
  .nav-left { display:flex; align-items:center; gap:15px; }
  .back { font-size:22px; color:#00b894; cursor:pointer; text-decoration:none; }
  .logo { font-size:20px; font-weight:900; color:#00b894; letter-spacing:2px; }
  .navbar h3 { font-size:16px; font-weight:800; color:#888; }
  .logout-btn { padding:10px 20px; background-color:#f2efe8; color:#888; font-size:14px; font-weight:700; border:none; border-radius:50px; cursor:pointer; }

  .content { padding:25px; }

  /* Tabs */
  .tabs { display:flex; gap:10px; margin-bottom:25px; }
  .tab { flex:1; padding:14px; background-color:#fffdf7; border:2px solid #ede9df; border-radius:15px; text-align:center; cursor:pointer; font-size:14px; font-weight:800; color:#888; transition:all 0.2s; position:relative; }
  .tab.active { border-color:#00b894; color:#00b894; background-color:#e8f8f4; }
  .tab-count { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; background-color:#00b894; color:#fff; border-radius:50%; font-size:11px; font-weight:900; margin-left:6px; vertical-align:middle; }
  .tab-count.orange { background-color:#e67e00; }
  .tab-count.red    { background-color:#e74c3c; }
  .tab-count.gray   { background-color:#aaa; }

  /* Worker card */
  .worker-card { background-color:#fffdf7; border:1px solid #ede9df; border-radius:20px; padding:22px 25px; margin-bottom:15px; }
  .wcard-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .wcard-name { font-size:18px; font-weight:900; }
  .wcard-skill { display:inline-flex; align-items:center; gap:6px; background-color:#e8f8f4; color:#00b894; border:1px solid #00b89433; border-radius:50px; padding:5px 14px; font-size:13px; font-weight:700; }
  .wcard-details { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px; }
  .detail-item { font-size:13px; color:#888; }
  .detail-item strong { color:#1a1a1a; display:block; font-size:14px; margin-top:2px; }

  /* Worker ID input row */
  .wid-row { display:flex; gap:10px; align-items:center; margin-bottom:15px; background-color:#f2efe8; border-radius:15px; padding:12px 15px; border:2px solid #ede9df; }
  .wid-row input { background:none; border:none; outline:none; font-size:16px; font-weight:700; color:#00b894; width:100%; letter-spacing:2px; }
  .wid-row input::placeholder { color:#ccc; font-weight:400; letter-spacing:0; }
  .wid-row .wid-label { font-size:12px; color:#aaa; white-space:nowrap; }
  .wid-row.has-id { border-color:#00b894; background-color:#e8f8f4; }
  .assigned-wid { display:flex; align-items:center; gap:8px; background-color:#e8f8f4; border:1px solid #00b89433; border-radius:50px; padding:6px 16px; font-size:14px; font-weight:700; color:#00b894; margin-bottom:15px; }

  /* Action buttons */
  .wcard-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn-approve { flex:2; padding:14px; background-color:#00b894; color:#fff; font-size:15px; font-weight:800; border:none; border-radius:12px; cursor:pointer; transition:background-color 0.2s; }
  .btn-approve:hover { background-color:#009e7f; }
  .btn-approve:disabled { background-color:#aaa; cursor:not-allowed; }
  .btn-reject  { flex:1; padding:14px; background-color:#fff0f0; color:#e74c3c; font-size:15px; font-weight:800; border:2px solid #e74c3c33; border-radius:12px; cursor:pointer; transition:all 0.2s; }
  .btn-reject:hover { background-color:#e74c3c; color:#fff; }
  .btn-revoke  { flex:1; padding:14px; background-color:#f2efe8; color:#888; font-size:14px; font-weight:700; border:none; border-radius:12px; cursor:pointer; }
  .status-badge { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:50px; font-size:13px; font-weight:700; }
  .status-badge.approved { background-color:#e8f8f4; color:#00b894; }
  .status-badge.rejected { background-color:#fff0f0; color:#e74c3c; }
  .wcard-date { font-size:12px; color:#aaa; margin-bottom:12px; }

  .empty-state { text-align:center; padding:50px 20px; color:#aaa; }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }
  .loading { text-align:center; padding:40px; color:#aaa; font-size:14px; }

  /* Toast */
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background-color:#1a1a1a; color:#fff; padding:14px 24px; border-radius:50px; font-size:14px; font-weight:700; z-index:9999; display:none; animation:slideDown 0.3s ease; white-space:nowrap; }
  .toast.green { background-color:#00b894; }
  .toast.red   { background-color:#e74c3c; }
  @keyframes slideDown { from{opacity:0;top:0} to{opacity:1;top:20px} }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="toast" id="toast"></div>

<nav class="navbar">
  <div class="nav-left">
    <a class="back" href="index.html">←</a>
    <div>
      <div class="logo">ZIPFIX</div>
      <div style="font-size:12px;color:#aaa;margin-top:2px;">Worker Management</div>
    </div>
  </div>
  <button class="logout-btn" onclick="adminLogout()">Logout</button>
</nav>

<div class="content">
  <div class="tabs">
    <div class="tab active" id="tab-pending"  onclick="switchTab('pending',this)">
      Pending <span class="tab-count orange" id="cnt-pending">0</span>
    </div>
    <div class="tab" id="tab-approved" onclick="switchTab('approved',this)">
      Approved <span class="tab-count" id="cnt-approved">0</span>
    </div>
    <div class="tab" id="tab-rejected" onclick="switchTab('rejected',this)">
      Rejected <span class="tab-count red" id="cnt-rejected">0</span>
    </div>
  </div>

  <div id="workerList"><div class="loading">⏳ Loading workers...</div></div>
</div>

<script>
  const SUPABASE_URL = 'https://wenvdgvyuhqdiktetvfj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ⚠️ Replace with your real Fast2SMS API key from fast2sms.com
  const FAST2SMS_KEY = 'YOUR_FAST2SMS_API_KEY';

  if (!localStorage.getItem('adminLoggedIn')) { window.location.href = 'login.html'; }

  let allWorkers = [], currentTab = 'pending';
  const skillIcons = { Plumber:'🔧', Electrician:'⚡', Locksmith:'🔑', 'AC Repair':'❄️', Carpenter:'🪛', Painter:'🖌️', 'Pest Control':'🐛', 'Home Cleaning':'🧹', 'TV / Electronics Repair':'📺', 'Water Purifier Service':'🫧', 'Appliance Repair':'🔩', 'Bathroom Renovation':'🛁', 'Packers & Movers':'📦', 'CCTV Installation':'🔒' };

  // Pending worker IDs being typed: workerDbId -> typed value
  const widInputs = {};

  async function loadWorkers() {
    try {
      const { data, error } = await db.from('workers').select('*').order('created_at', {ascending:false});
      if (error) throw error;
      allWorkers = data || [];
      updateCounts();
      renderTab(currentTab);
    } catch(e) {
      document.getElementById('workerList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Error: ' + e.message + '</p></div>';
    }
  }

  function updateCounts() {
    document.getElementById('cnt-pending').innerText  = allWorkers.filter(w=>w.status==='pending').length;
    document.getElementById('cnt-approved').innerText = allWorkers.filter(w=>w.status==='approved').length;
    document.getElementById('cnt-rejected').innerText = allWorkers.filter(w=>w.status==='rejected').length;
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderTab(tab);
  }

  function renderTab(tab) {
    const workers = allWorkers.filter(w => w.status === tab);
    const list = document.getElementById('workerList');
    if (!workers.length) {
      const msgs = { pending:'No pending applications', approved:'No approved workers yet', rejected:'No rejected applications' };
      list.innerHTML = '<div class="empty-state"><div class="icon">' + (tab==='pending'?'📋':tab==='approved'?'✅':'❌') + '</div><p>' + msgs[tab] + '</p></div>';
      return;
    }
    list.innerHTML = workers.map(w => buildCard(w)).join('');
  }

  function generateWorkerId() {
    const num = Math.floor(1000 + Math.random() * 9000);
    return 'ZF-' + num;
  }

  function buildCard(w) {
    const icon = skillIcons[w.skill] || '👷';
    const date = w.created_at ? new Date(w.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const phone = (w.phone||'').replace('+91','');

    if (w.status === 'pending') {
      // Auto-suggest a worker ID if not typed yet
      const suggestedId = widInputs[w.id] || generateWorkerId();
      if (!widInputs[w.id]) widInputs[w.id] = suggestedId;
      return `
        <div class="worker-card" id="card-${w.id}">
          <div class="wcard-header">
            <div class="wcard-name">${w.name}</div>
            <div class="wcard-skill">${icon} ${w.skill}</div>
          </div>
          <div class="wcard-date">📅 Applied: ${date}</div>
          <div class="wcard-details">
            <div class="detail-item">📞 Phone<strong>${phone}</strong></div>
            <div class="detail-item">📍 Area<strong>${w.area||'—'}</strong></div>
            <div class="detail-item">💼 Experience<strong>${w.experience||'—'}</strong></div>
            <div class="detail-item">🪪 ${w.id_type||'ID'}<strong>${w.id_number||'—'}</strong></div>
          </div>
          <div class="wid-row has-id" id="widrow-${w.id}">
            <span class="wid-label">Worker ID:</span>
            <input type="text" id="widinput-${w.id}" value="${suggestedId}" placeholder="ZF-XXXX" oninput="saveWidInput(${w.id}, this.value)" onchange="saveWidInput(${w.id}, this.value)" />
            <span style="font-size:18px;cursor:pointer;" onclick="randomiseId(${w.id})" title="Generate new ID">🔄</span>
          </div>
          <div class="wcard-actions">
            <button class="btn-approve" id="approvebtn-${w.id}" onclick="approveWorker(${w.id}, '${w.name}', '${phone}')">✅ Approve & Send ID</button>
            <button class="btn-reject"  onclick="rejectWorker(${w.id}, '${w.name}', '${phone}')">✗ Reject</button>
          </div>
        </div>`;
    }

    if (w.status === 'approved') {
      return `
        <div class="worker-card" id="card-${w.id}">
          <div class="wcard-header">
            <div class="wcard-name">${w.name}</div>
            <div class="wcard-skill">${icon} ${w.skill}</div>
          </div>
          <div class="wcard-date">📅 Applied: ${date}</div>
          <div class="wcard-details">
            <div class="detail-item">📞 Phone<strong>${phone}</strong></div>
            <div class="detail-item">📍 Area<strong>${w.area||'—'}</strong></div>
            <div class="detail-item">💼 Experience<strong>${w.experience||'—'}</strong></div>
            <div class="detail-item">🪪 ${w.id_type||'ID'}<strong>${w.id_number||'—'}</strong></div>
          </div>
          <div class="assigned-wid">🪪 Worker ID: <strong>${w.worker_id||'—'}</strong></div>
          <div class="wcard-actions">
            <div class="status-badge approved">✅ Approved</div>
            <button class="btn-revoke" onclick="revokeWorker(${w.id}, '${w.name}')">Revoke</button>
          </div>
        </div>`;
    }

    if (w.status === 'rejected') {
      return `
        <div class="worker-card" id="card-${w.id}">
          <div class="wcard-header">
            <div class="wcard-name">${w.name}</div>
            <div class="wcard-skill">${icon} ${w.skill}</div>
          </div>
          <div class="wcard-date">📅 Applied: ${date}</div>
          <div class="wcard-details">
            <div class="detail-item">📞 Phone<strong>${phone}</strong></div>
            <div class="detail-item">📍 Area<strong>${w.area||'—'}</strong></div>
            <div class="detail-item">💼 Experience<strong>${w.experience||'—'}</strong></div>
            <div class="detail-item">🪪 ${w.id_type||'ID'}<strong>${w.id_number||'—'}</strong></div>
          </div>
          <div class="wcard-actions">
            <div class="status-badge rejected">❌ Rejected</div>
            <button class="btn-approve" onclick="reApproveWorker(${w.id}, '${w.name}', '${phone}')">Re-Approve</button>
          </div>
        </div>`;
    }
  }

  function saveWidInput(id, val) { widInputs[id] = val.trim().toUpperCase(); }
  function randomiseId(id) {
    const newId = generateWorkerId();
    widInputs[id] = newId;
    const input = document.getElementById('widinput-'+id);
    if (input) input.value = newId;
  }

  async function approveWorker(id, name, phone) {
    const workerIdVal = (widInputs[id] || generateWorkerId()).trim().toUpperCase();
    if (!workerIdVal || workerIdVal.length < 4) { showToast('⚠️ Please enter a valid Worker ID', 'red'); return; }
    const btn = document.getElementById('approvebtn-'+id);
    if (btn) { btn.innerText = 'Approving...'; btn.disabled = true; }
    try {
      const { error } = await db.from('workers').update({status:'approved', worker_id: workerIdVal}).eq('id', id);
      if (error) throw error;
      await sendSMS(phone, `Hi ${name}! Your ZipFix Worker application has been APPROVED. Your Worker ID is: ${workerIdVal}. Login at zipfix.vercel.app/worker/splash.html to start earning!`);
      // Update local list
      const w = allWorkers.find(x=>x.id===id);
      if (w) { w.status='approved'; w.worker_id=workerIdVal; }
      updateCounts(); renderTab('pending');
      showToast('✅ ' + name + ' approved! Worker ID: ' + workerIdVal, 'green');
    } catch(e) { showToast('⚠️ Error: ' + e.message, 'red'); if(btn){btn.innerText='✅ Approve & Send ID';btn.disabled=false;} }
  }

  async function rejectWorker(id, name, phone) {
    if (!confirm('Reject application from ' + name + '?')) return;
    try {
      const { error } = await db.from('workers').update({status:'rejected'}).eq('id', id);
      if (error) throw error;
      await sendSMS(phone, `Hi ${name}, we regret to inform you that your ZipFix Worker application was not approved at this time. Contact help@zipfix.com for more info.`);
      const w = allWorkers.find(x=>x.id===id);
      if (w) w.status='rejected';
      updateCounts(); renderTab('pending');
      showToast('❌ ' + name + '\'s application rejected', 'red');
    } catch(e) { showToast('⚠️ Error: ' + e.message, 'red'); }
  }

  async function revokeWorker(id, name) {
    if (!confirm('Revoke approval for ' + name + '? They will lose access.')) return;
    try {
      const { error } = await db.from('workers').update({status:'pending', worker_id: null}).eq('id', id);
      if (error) throw error;
      const w = allWorkers.find(x=>x.id===id);
      if (w) { w.status='pending'; w.worker_id=null; }
      updateCounts(); renderTab('approved');
      showToast('⚠️ ' + name + '\'s approval revoked');
    } catch(e) { showToast('⚠️ Error: ' + e.message, 'red'); }
  }

  async function reApproveWorker(id, name, phone) {
    widInputs[id] = generateWorkerId();
    const w = allWorkers.find(x=>x.id===id);
    if (w) { w.status='pending'; }
    updateCounts(); renderTab('rejected');
    showToast('ℹ️ Moved to Pending — set Worker ID and approve');
    setTimeout(() => switchTab('pending', document.getElementById('tab-pending')), 800);
  }

  async function sendSMS(phone, message) {
    const cleanPhone = phone.replace(/[^0-9]/g, '').slice(-10);
    try {
      const url = `https://www.fast2sms.com/dev/bulkV2?authorization=${FAST2SMS_KEY}&route=q&message=${encodeURIComponent(message)}&flash=0&numbers=${cleanPhone}`;
      await fetch(url, { method: 'GET', headers: { 'cache-control': 'no-cache' } });
    } catch(e) { console.warn('SMS failed (non-blocking):', e.message); }
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.className = 'toast' + (type?' '+type:'');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3500);
  }

  function adminLogout() {
    if (confirm('Logout from admin?')) {
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminLoginTime');
      window.location.href = 'login.html';
    }
  }

  loadWorkers();
</script>
</body>
</html>
