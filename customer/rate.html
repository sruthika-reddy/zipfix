<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ZipFix — Rate Worker</title>
</head>
<body>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#f5f5f5;color:#1a1a1a;min-height:100vh;}
  .navbar{display:flex;align-items:center;padding:16px 20px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .navbar h3{font-size:18px;font-weight:800;margin:0 auto;}
  .content{padding:20px 20px 50px;}
  .success-banner{background:linear-gradient(135deg,#e8f8f4,#d4f2ea);border:2px solid #00b89433;border-radius:20px;padding:26px;text-align:center;margin-bottom:18px;}
  .success-icon{font-size:52px;margin-bottom:12px;}
  .success-banner h2{font-size:21px;font-weight:900;color:#00b894;margin-bottom:5px;}
  .success-banner p{font-size:13px;color:#555;}
  .receipt-card{background:#fff;border-radius:18px;padding:18px 20px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .receipt-card h4{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:800;}
  .receipt-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:14px;}
  .receipt-row:last-child{border-bottom:none;font-size:17px;font-weight:900;}
  .receipt-row .r-label{color:#888;}
  .receipt-row .r-value{font-weight:700;}
  .receipt-row:last-child .r-value{color:#00b894;}
  .rating-card{background:#fff;border-radius:18px;padding:22px 20px;margin-bottom:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .worker-avatar{width:72px;height:72px;background:#00b894;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 12px;}
  .rating-card h3{font-size:19px;font-weight:800;margin-bottom:4px;}
  .rating-card p{font-size:13px;color:#888;margin-bottom:20px;}
  .stars-row{display:flex;justify-content:center;gap:10px;margin-bottom:10px;}
  .star{font-size:36px;cursor:pointer;opacity:0.2;transition:opacity 0.15s,transform 0.15s;}
  .star.active{opacity:1;transform:scale(1.15);}
  .rating-label{font-size:14px;font-weight:800;color:#00b894;margin-bottom:16px;min-height:22px;}
  textarea{width:100%;padding:13px 15px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:13px;color:#1a1a1a;font-size:14px;outline:none;resize:none;font-family:'Segoe UI',sans-serif;transition:border-color 0.2s;}
  textarea:focus{border-color:#00b894;}
  .quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .tag{padding:7px 14px;background:#f5f5f5;border-radius:50px;font-size:13px;cursor:pointer;border:2px solid #e0e0e0;color:#555;transition:all 0.2s;}
  .tag.selected{border-color:#00b894;color:#00b894;background:#e8f8f4;}
  .btn-submit{width:100%;padding:17px;background:#00b894;color:#fff;font-size:17px;font-weight:900;border:none;border-radius:14px;cursor:pointer;margin-top:16px;transition:background 0.2s;}
  .btn-submit:hover{background:#009e7f;}
  .btn-submit:disabled{background:#ccc;cursor:not-allowed;}
  .skip-text{text-align:center;margin-top:14px;font-size:14px;color:#aaa;cursor:pointer;}
  .skip-text:hover{color:#555;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<nav class="navbar">
  <h3>Rate Your Experience ⭐</h3>
</nav>
<div class="content">
  <div class="success-banner">
    <div class="success-icon">✅</div>
    <h2>Job Completed!</h2>
    <p>Your problem has been fixed successfully</p>
  </div>
  <div class="receipt-card">
    <h4>Receipt</h4>
    <div class="receipt-row"><span class="r-label">Service</span><span class="r-value" id="recService">—</span></div>
    <div class="receipt-row"><span class="r-label">Worker</span><span class="r-value" id="recWorker">—</span></div>
    <div class="receipt-row"><span class="r-label">Job ID</span><span class="r-value" id="recJobId" style="color:#aaa">—</span></div>
    <div class="receipt-row"><span class="r-label">Payment</span><span class="r-value" id="recMethod">—</span></div>
    <div class="receipt-row"><span class="r-label">Total Paid</span><span class="r-value" id="recTotal">—</span></div>
  </div>
  <div class="rating-card">
    <div class="worker-avatar" id="workerAvatar">?</div>
    <h3 id="workerName">—</h3>
    <p>How was your experience?</p>
    <div class="stars-row">
      <div class="star" onclick="selectStar(1)">⭐</div>
      <div class="star" onclick="selectStar(2)">⭐</div>
      <div class="star" onclick="selectStar(3)">⭐</div>
      <div class="star" onclick="selectStar(4)">⭐</div>
      <div class="star" onclick="selectStar(5)">⭐</div>
    </div>
    <div class="rating-label" id="ratingLabel">Tap a star to rate</div>
    <textarea id="feedback" rows="3" placeholder="Tell us about your experience (optional)"></textarea>
    <div class="quick-tags">
      <div class="tag" onclick="toggleTag(this)">👍 Professional</div>
      <div class="tag" onclick="toggleTag(this)">⚡ Fast</div>
      <div class="tag" onclick="toggleTag(this)">💰 Fair Price</div>
      <div class="tag" onclick="toggleTag(this)">🔧 Skilled</div>
      <div class="tag" onclick="toggleTag(this)">😊 Friendly</div>
      <div class="tag" onclick="toggleTag(this)">🧹 Clean Work</div>
    </div>
  </div>
  <button class="btn-submit" id="submitBtn" onclick="submitRating()">Submit Rating</button>
  <div class="skip-text" onclick="skipRating()">Skip for now</div>
</div>
<script>
  if(!localStorage.getItem('phoneNumber')){window.location.href='login.html';}
  const db=supabase.createClient('https://wenvdgvyuhqdiktetvfj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbnZkZ3Z5dWhxZGlrdGV0dmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUyNjksImV4cCI6MjA4ODI4MTI2OX0.3N1prPO5WiH0Qt_UV5g86cRqV7p3DcUUgqNi5w0WkB4');
  const icons={Plumber:'🔧',Electrician:'⚡',Locksmith:'🔑','AC Repair':'❄️',Carpenter:'🪛',Painter:'🖌️','Pest Control':'🐛','Home Cleaning':'🧹','TV / Electronics Repair':'📺','Water Purifier Service':'🫧','Appliance Repair':'🔩','Bathroom Renovation':'🛁','Packers & Movers':'📦','CCTV Installation':'🔒'};
  const ratingLabels={1:'😞 Poor',2:'😐 Fair',3:'🙂 Good',4:'😊 Great',5:'🤩 Excellent!'};
  const service=localStorage.getItem('bookingService')||'—';
  const workerName=localStorage.getItem('workerName')||'—';
  const workerInitial=localStorage.getItem('workerInitial')||'?';
  const paymentMethod=localStorage.getItem('paymentMethod')||'—';
  const amountPaid=localStorage.getItem('amountPaid')||'—';
  const jobId=localStorage.getItem('activeJobId')||localStorage.getItem('lastJobId')||'—';
  document.getElementById('recService').innerText=(icons[service]||'🔧')+' '+service;
  document.getElementById('recWorker').innerText=workerName;
  document.getElementById('recJobId').innerText=jobId!=='—'?'#'+jobId:'—';
  document.getElementById('recMethod').innerText=paymentMethod;
  document.getElementById('recTotal').innerText=amountPaid!=='—'?'₹'+amountPaid:'—';
  document.getElementById('workerName').innerText=workerName;
  document.getElementById('workerAvatar').innerText=workerInitial;
  let selectedRating=0;
  const stars=document.querySelectorAll('.star');
  function selectStar(n){selectedRating=n;stars.forEach((s,i)=>i<n?s.classList.add('active'):s.classList.remove('active'));document.getElementById('ratingLabel').innerText=ratingLabels[n];}
  function toggleTag(el){el.classList.toggle('selected');}
  async function submitRating(){
    if(selectedRating===0){alert('Please select a star rating');return;}
    const btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerText='Submitting...';
    const tags=[...document.querySelectorAll('.tag.selected')].map(t=>t.innerText).join(', ');
    const feedback=document.getElementById('feedback').value.trim();
    const comment=[feedback,tags].filter(Boolean).join(' | ');
    const custPhone='+91'+localStorage.getItem('phoneNumber');
    try{
      await db.from('ratings').insert([{worker_id:localStorage.getItem('assignedWorkerId')||null,customer_id:custPhone,booking_id:jobId!=='—'?parseInt(jobId):null,rating:selectedRating,feedback:comment||null}]);
      const wId=localStorage.getItem('assignedWorkerId');
      if(wId){const{data:all}=await db.from('ratings').select('rating').eq('worker_id',wId);if(all&&all.length){const avg=(all.reduce((s,r)=>s+r.rating,0)/all.length).toFixed(1);await db.from('workers').update({rating:avg,total_jobs:all.length}).eq('worker_id',wId);}}
      localStorage.removeItem('activeJobId');localStorage.removeItem('assignedWorkerId');localStorage.setItem('lastRating',selectedRating);
      alert('🎉 Thank you for rating '+workerName+'!\n'+ratingLabels[selectedRating]);
      window.location.href='dashboard.html';
    }catch(e){btn.disabled=false;btn.innerText='Submit Rating';alert('Rating saved. Thank you!');window.location.href='dashboard.html';}
  }
  function skipRating(){localStorage.removeItem('activeJobId');window.location.href='dashboard.html';}
</script>
</body>
</html>
