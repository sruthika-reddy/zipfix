<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Bookings</title>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background-color:#faf8f2; color:#1a1a1a; min-height:100vh; }
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:20px 30px; background-color:#fffdf7; border-bottom:1px solid #ede9df; }
  .logo { font-size:22px; font-weight:900; color:#00b894; letter-spacing:2px; }
  .back-btn { background:none; border:none; color:#00b894; font-size:22px; cursor:pointer; }
  .page-title { padding:30px 30px 5px; font-size:26px; font-weight:900; color:#1a1a1a; }
  .page-subtitle { padding:0 30px 25px; font-size:14px; color:#888; }
  .filter-tabs { display:flex; gap:10px; padding:0 30px 25px; }
  .tab { padding:8px 20px; border-radius:50px; font-size:13px; font-weight:700; cursor:pointer; border:2px solid #ede9df; color:#888; background:#fffdf7; transition:all 0.2s; }
  .tab.active { background-color:#00b894; color:#fff; border-color:#00b894; }
  .bookings-section { padding:0 30px 30px; }
  .booking-card { background-color:#fffdf7; border:1px solid #ede9df; border-radius:20px; padding:20px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
  .booking-info h4 { font-size:16px; font-weight:800; color:#1a1a1a; }
  .booking-info p { font-size:13px; color:#888; margin-top:4px; }
  .booking-status { padding:8px 15px; border-radius:20px; font-size:12px; font-weight:800; white-space:nowrap; }
  .status-completed { background-color:#e8f8f4; color:#00b894; }
  .status-cancelled { background-color:#fff0ee; color:#e74c3c; }
  .status-pending   { background-color:#fffbe6; color:#f39c12; }
  .empty-state { text-align:center; padding:60px 30px; color:#bbb; }
  .empty-state .empty-icon { font-size:60px; margin-bottom:15px; }
  .empty-state p { font-size:16px; font-weight:700; }
  .spacer { height:80px; }
  .bottom-nav { position:fixed; bottom:0; width:100%; background-color:#fffdf7; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #ede9df; }
  .nav-item { display:flex; flex-direction:column; align-items:center; cursor:pointer; font-size:11px; color:#aaa; gap:4px; }
  .nav-item.active { color:#00b894; }
  .nav-item .nav-icon { font-size:22px; }
</style>

<nav class="navbar">
  <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
  <div class="logo">ZIPFIX</div>
  <div style="width:40px"></div>
</nav>

<div class="page-title">My Bookings</div>
<div class="page-subtitle">Your service history</div>

<div class="filter-tabs">
  <button class="tab active" onclick="filterBookings('all', this)">All</button>
  <button class="tab" onclick="filterBookings('completed', this)">Completed</button>
  <button class="tab" onclick="filterBookings('cancelled', this)">Cancelled</button>
</div>

<div class="bookings-section" id="bookingsList">
  <div class="booking-card" data-status="completed">
    <div class="booking-info"><h4>🔧 Plumber</h4><p>Yesterday, 11:30 PM</p></div>
    <div class="booking-status status-completed">Completed</div>
  </div>
  <div class="booking-card" data-status="completed">
    <div class="booking-info"><h4>⚡ Electrician</h4><p>2 days ago, 2:00 AM</p></div>
    <div class="booking-status status-completed">Completed</div>
  </div>
  <div class="booking-card" data-status="cancelled">
    <div class="booking-info"><h4>❄️ AC Repair</h4><p>Last week, 9:00 PM</p></div>
    <div class="booking-status status-cancelled">Cancelled</div>
  </div>
</div>

<div class="spacer"></div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div><div>Home</div></div>
  <div class="nav-item active"><div class="nav-icon">📋</div><div>Bookings</div></div>
  <div class="nav-item" onclick="window.location.href='track.html'"><div class="nav-icon">📍</div><div>Track</div></div>
  <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div><div>Profile</div></div>
</nav>

<script>
  if (!localStorage.getItem('phoneNumber')) { window.location.href = 'login.html'; }
  if (localStorage.getItem('adminLoggedIn')) { window.location.href = '../admin/index.html'; }

  function filterBookings(status, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const cards = document.querySelectorAll('.booking-card');
    let visible = 0;
    cards.forEach(card => {
      if (status === 'all' || card.dataset.status === status) { card.style.display = 'flex'; visible++; }
      else card.style.display = 'none';
    });
    const existing = document.getElementById('emptyState');
    if (existing) existing.remove();
    if (visible === 0) {
      const empty = document.createElement('div');
      empty.id = 'emptyState'; empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-icon">📋</div><p>No bookings found</p>';
      document.getElementById('bookingsList').appendChild(empty);
    }
  }
</script>
</body>
</html>
