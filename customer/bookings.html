<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipFix — Bookings</title>
</head>
<body>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background-color: #0f0f0f;
    color: white;
    min-height: 100vh;
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    background-color: #1a1a1a;
  }

  .logo {
    font-size: 22px;
    font-weight: 900;
    color: #00d4ff;
    letter-spacing: 2px;
  }

  .back-btn {
    background: none;
    border: none;
    color: #00d4ff;
    font-size: 22px;
    cursor: pointer;
  }

  .page-title {
    padding: 30px 30px 5px;
    font-size: 26px;
    font-weight: 900;
  }

  .page-subtitle {
    padding: 0 30px 25px;
    font-size: 14px;
    color: #aaaaaa;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 10px;
    padding: 0 30px 25px;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid #333;
    color: #aaaaaa;
    background: none;
  }

  .tab.active {
    background-color: #00d4ff;
    color: #0f0f0f;
    border-color: #00d4ff;
  }

  /* Booking cards */
  .bookings-section {
    padding: 0 30px 30px;
  }

  .booking-card {
    background-color: #1a1a1a;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .booking-info h4 {
    font-size: 16px;
    font-weight: 800;
  }

  .booking-info p {
    font-size: 13px;
    color: #aaaaaa;
    margin-top: 4px;
  }

  .booking-status {
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .status-completed {
    background-color: #1a3a1a;
    color: #00ff88;
  }

  .status-cancelled {
    background-color: #3a1a1a;
    color: #ff3b3b;
  }

  .status-pending {
    background-color: #3a3a1a;
    color: #ffcc00;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 30px;
    color: #555;
  }

  .empty-state .empty-icon {
    font-size: 60px;
    margin-bottom: 15px;
  }

  .empty-state p {
    font-size: 16px;
    font-weight: 700;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background-color: #1a1a1a;
    display: flex;
    justify-content: space-around;
    padding: 15px 0;
    border-top: 1px solid #333;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    font-size: 11px;
    color: #aaaaaa;
    gap: 4px;
  }

  .nav-item.active {
    color: #00d4ff;
  }

  .nav-item .nav-icon {
    font-size: 22px;
  }

  .spacer { height: 80px; }
</style>

<nav class="navbar">
  <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
  <div class="logo">ZIPFIX</div>
  <div style="width:40px"></div>
</nav>

<div class="page-title">My Bookings</div>
<div class="page-subtitle">Your service history</div>

<div class="filter-tabs">
  <button class="tab active" onclick="filterBookings('all', this)">All</button>
  <button class="tab" onclick="filterBookings('completed', this)">Completed</button>
  <button class="tab" onclick="filterBookings('cancelled', this)">Cancelled</button>
</div>

<div class="bookings-section" id="bookingsList">
  <div class="booking-card" data-status="completed">
    <div class="booking-info">
      <h4>🔧 Plumber</h4>
      <p>Yesterday, 11:30 PM</p>
    </div>
    <div class="booking-status status-completed">Completed</div>
  </div>

  <div class="booking-card" data-status="completed">
    <div class="booking-info">
      <h4>⚡ Electrician</h4>
      <p>2 days ago, 2:00 AM</p>
    </div>
    <div class="booking-status status-completed">Completed</div>
  </div>

  <div class="booking-card" data-status="cancelled">
    <div class="booking-info">
      <h4>❄️ AC Repair</h4>
      <p>Last week, 9:00 PM</p>
    </div>
    <div class="booking-status status-cancelled">Cancelled</div>
  </div>
</div>

<div class="spacer"></div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='dashboard.html'">
    <div class="nav-icon">🏠</div>
    <div>Home</div>
  </div>
  <div class="nav-item active">
    <div class="nav-icon">📋</div>
    <div>Bookings</div>
  </div>
  <div class="nav-item" onclick="window.location.href='track.html'">
    <div class="nav-icon">📍</div>
    <div>Track</div>
  </div>
  <div class="nav-item" onclick="window.location.href='profile.html'">
    <div class="nav-icon">👤</div>
    <div>Profile</div>
  </div>
</nav>

<script>
  function filterBookings(status, btn) {
    // Update active tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    // Filter cards
    const cards = document.querySelectorAll('.booking-card');
    let visible = 0;
    cards.forEach(card => {
      if (status === 'all' || card.dataset.status === status) {
        card.style.display = 'flex';
        visible++;
      } else {
        card.style.display = 'none';
      }
    });

    // Show empty state if nothing visible
    const existing = document.getElementById('emptyState');
    if (existing) existing.remove();
    if (visible === 0) {
      const empty = document.createElement('div');
      empty.id = 'emptyState';
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-icon">📋</div><p>No bookings found</p>';
      document.getElementById('bookingsList').appendChild(empty);
    }
  }
</script>

</body>
</html>
